<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>混沌行者 | Chaos Walker</title>
  <style>
    :root {
      --neon-green: #00ff88;
      --nebula-purple: #8b5cf6;
      --deep-void: #0a0a0f;
      --accent-cyan: #00d4ff;
      --glow-green: rgba(0, 255, 136, 0.6);
      --glow-purple: rgba(139, 92, 246, 0.6);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--deep-void);
      font-family: 'Courier New', 'Microsoft YaHei', monospace;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    #particle-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #fragment-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .distortion-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      background: 
        radial-gradient(ellipse at 20% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(0, 255, 136, 0.08) 0%, transparent 50%);
    }

    .distortion-layer::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 200%;
      height: 200%;
      transform: translate(-50%, -50%);
      background: conic-gradient(from 0deg, transparent, rgba(0, 255, 136, 0.03), transparent, rgba(139, 92, 246, 0.03), transparent);
      animation: distortionRotate 30s linear infinite;
    }

    @keyframes distortionRotate {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .ripple-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
    }

    .ripple {
      position: absolute;
      border: 1px solid var(--neon-green);
      border-radius: 50%;
      animation: rippleExpand 3s ease-out forwards;
      opacity: 0;
    }

    @keyframes rippleExpand {
      0% { transform: scale(0); opacity: 0.8; }
      100% { transform: scale(4); opacity: 0; }
    }

    #main-container {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    #progress-container {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      max-width: 500px;
      z-index: 100;
    }

    .progress-track {
      width: 100%;
      height: 2px;
      background: rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--neon-green), var(--accent-cyan));
      box-shadow: 0 0 10px var(--neon-green), 0 0 20px var(--glow-green);
      transition: width 0.3s ease;
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      right: 0;
      top: -3px;
      width: 8px;
      height: 8px;
      background: var(--neon-green);
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      box-shadow: 0 0 15px var(--neon-green);
    }

    .progress-markers {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
    }

    .progress-marker {
      width: 6px;
      height: 6px;
      background: rgba(255, 255, 255, 0.2);
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      transition: all 0.3s ease;
    }

    .progress-marker.active {
      background: var(--neon-green);
      box-shadow: 0 0 10px var(--neon-green);
      transform: scale(1.3);
    }

    #scene-container {
      max-width: 800px;
      width: 100%;
      text-align: center;
      position: relative;
    }

    #text-display {
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      line-height: 2;
      color: rgba(255, 255, 255, 0.95);
      text-shadow: 
        0 0 10px var(--glow-green),
        0 0 20px rgba(0, 255, 136, 0.3),
        0 0 40px rgba(139, 92, 246, 0.2);
      min-height: 120px;
      padding: 40px 20px;
      position: relative;
      letter-spacing: 0.5px;
    }

    #text-display .rune {
      display: inline-block;
      color: var(--neon-green);
      text-shadow: 0 0 15px var(--neon-green), 0 0 30px var(--glow-green);
      animation: runePulse 2s ease-in-out infinite;
      font-size: 1.1em;
    }

    @keyframes runePulse {
      0%, 100% { opacity: 0.7; text-shadow: 0 0 10px var(--neon-green); }
      50% { opacity: 1; text-shadow: 0 0 20px var(--neon-green), 0 0 40px var(--glow-green); }
    }

    .cursor {
      display: inline-block;
      width: 3px;
      height: 1.2em;
      background: var(--neon-green);
      margin-left: 4px;
      animation: cursorBlink 0.8s step-end infinite;
      box-shadow: 0 0 10px var(--neon-green);
      vertical-align: middle;
    }

    @keyframes cursorBlink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    #choices-container {
      margin-top: 40px;
      display: flex;
      gap: 30px;
      justify-content: center;
      flex-wrap: wrap;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.5s ease;
    }

    #choices-container.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .choice-btn {
      background: transparent;
      border: 2px solid var(--neon-green);
      color: var(--neon-green);
      padding: 15px 35px;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .choice-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 136, 0.2), transparent);
      transition: left 0.5s ease;
    }

    .choice-btn:hover::before {
      left: 100%;
    }

    .choice-btn::after {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(45deg, var(--neon-green), var(--nebula-purple), var(--neon-green));
      z-index: -1;
      opacity: 0;
      transition: opacity 0.3s ease;
      clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
    }

    .choice-btn:hover::after {
      opacity: 0.5;
    }

    .choice-btn:hover {
      background: rgba(0, 255, 136, 0.1);
      box-shadow: 
        0 0 20px var(--glow-green),
        inset 0 0 20px rgba(0, 255, 136, 0.1);
      transform: scale(1.05);
    }

    .choice-btn:active {
      transform: scale(0.98);
    }

    #continue-hint {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.85rem;
      letter-spacing: 3px;
      animation: hintPulse 2s ease-in-out infinite;
      cursor: pointer;
    }

    @keyframes hintPulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }

    #mouse-glow {
      position: fixed;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 255, 136, 0.15) 0%, transparent 70%);
      pointer-events: none;
      z-index: 5;
      transform: translate(-50%, -50%);
      transition: opacity 0.3s ease;
    }

    .scene-transition {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 50;
      pointer-events: none;
    }

    .fragment {
      position: absolute;
      background: linear-gradient(135deg, var(--neon-green), var(--nebula-purple));
      opacity: 0;
    }

    #title-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1000;
      background: var(--deep-void);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 1s ease;
    }

    #title-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .title-text {
      font-size: clamp(2rem, 8vw, 5rem);
      color: var(--neon-green);
      text-shadow: 
        0 0 20px var(--neon-green),
        0 0 40px var(--glow-green),
        0 0 80px rgba(0, 255, 136, 0.5);
      letter-spacing: 15px;
      animation: titleGlow 3s ease-in-out infinite;
      margin-bottom: 20px;
    }

    @keyframes titleGlow {
      0%, 100% { text-shadow: 0 0 20px var(--neon-green), 0 0 40px var(--glow-green); }
      50% { text-shadow: 0 0 30px var(--neon-green), 0 0 60px var(--glow-green), 0 0 100px rgba(139, 92, 246, 0.5); }
    }

    .subtitle-text {
      font-size: 1rem;
      color: var(--nebula-purple);
      letter-spacing: 8px;
      margin-bottom: 60px;
      opacity: 0.8;
    }

    .start-btn {
      background: transparent;
      border: 2px solid var(--neon-green);
      color: var(--neon-green);
      padding: 20px 60px;
      font-size: 1.2rem;
      font-family: inherit;
      cursor: pointer;
      clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
      letter-spacing: 5px;
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
    }

    .start-btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(0, 255, 136, 0.2);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.6s ease, height 0.6s ease;
    }

    .start-btn:hover::before {
      width: 300px;
      height: 300px;
    }

    .start-btn:hover {
      background: rgba(0, 255, 136, 0.1);
      box-shadow: 0 0 30px var(--glow-green);
      transform: scale(1.05);
    }

    #ending-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1000;
      background: var(--deep-void);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.5s ease;
    }

    #ending-screen.visible {
      opacity: 1;
      pointer-events: all;
    }

    .ending-text {
      font-size: 2rem;
      color: var(--neon-green);
      text-shadow: 0 0 30px var(--neon-green);
      margin-bottom: 40px;
      letter-spacing: 10px;
    }

    .restart-btn {
      background: transparent;
      border: 1px solid var(--nebula-purple);
      color: var(--nebula-purple);
      padding: 15px 40px;
      font-size: 0.9rem;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 3px;
      transition: all 0.3s ease;
      clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
    }

    .restart-btn:hover {
      background: rgba(139, 92, 246, 0.2);
      box-shadow: 0 0 20px var(--glow-purple);
    }

    .floating-fragment {
      position: fixed;
      pointer-events: none;
      z-index: 3;
      opacity: 0.3;
    }

    .geometric-shape {
      position: absolute;
      background: linear-gradient(45deg, rgba(0, 255, 136, 0.1), rgba(139, 92, 246, 0.1));
      border: 1px solid rgba(0, 255, 136, 0.2);
    }

    .shape-triangle {
      width: 0;
      height: 0;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-bottom: 35px solid rgba(0, 255, 136, 0.15);
      background: transparent;
    }

    .shape-hexagon {
      width: 40px;
      height: 23px;
      background: rgba(139, 92, 246, 0.15);
      position: relative;
    }

    .shape-hexagon::before,
    .shape-hexagon::after {
      content: '';
      position: absolute;
      width: 0;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
    }

    .shape-hexagon::before {
      bottom: 100%;
      border-bottom: 11.5px solid rgba(139, 92, 246, 0.15);
    }

    .shape-hexagon::after {
      top: 100%;
      border-top: 11.5px solid rgba(139, 92, 246, 0.15);
    }

    @keyframes floatRotate {
      0% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(180deg); }
      100% { transform: translateY(0) rotate(360deg); }
    }

    @keyframes hexagonRotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="title-screen">
    <h1 class="title-text">混沌行者</h1>
    <p class="subtitle-text">CHAOS WALKER</p>
    <button class="start-btn" id="start-btn">进入维度</button>
  </div>

  <div id="canvas-container">
    <canvas id="particle-canvas"></canvas>
    <canvas id="fragment-canvas"></canvas>
  </div>

  <div class="distortion-layer"></div>
  <div class="ripple-container" id="ripple-container"></div>
  <div id="mouse-glow"></div>

  <div id="main-container">
    <div id="scene-container">
      <div id="text-display"></div>
      <div id="choices-container"></div>
    </div>
  </div>

  <div id="continue-hint" style="display: none;">继续</div>

  <div id="progress-container">
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="progress-markers" id="progress-markers"></div>
  </div>

  <div id="ending-screen">
    <div class="ending-text">维度永续</div>
    <p style="color: rgba(255,255,255,0.6); margin-bottom: 40px; letter-spacing: 3px;">EXISTENCE CONTINUES</p>
    <button class="restart-btn" id="restart-btn">重新开始</button>
  </div>

  <script>
    // ==================== 场景数据 ====================
    const scenes = {
      start: {
        id: 'start',
        text: '我存在了很久，久到时间对我而言只是维度的涟漪。我的形态是液态暗物质，一个活体几何悖论，没有眼睛或四肢，只通过折叠空间来感知周围。意识像潮水一样涌动，没有起点也没有终点，偶尔自嘲：这算不算一种永恒的无聊？',
        next: 'order_approach',
        isChoice: false
      },
      order_approach: {
        id: 'order_approach',
        text: '最近，我感知到一种规律性的波动在靠近，像某种秩序试图侵入我的边界。它带来结构化的节奏，与我混沌的本质形成对比。我有点好奇，但更多的是警惕——毕竟，无序才是我的舒适区。',
        next: 'choice1',
        isChoice: false
      },
      choice1: {
        id: 'choice1',
        text: '我犹豫了：是接触这种秩序，看看它带来什么，还是退回更深的混沌中保持自我？这个选择没有对错，只取决于当下的冲动。',
        choices: [
          { text: '接触秩序', next: 'touch_order' },
          { text: '退回混沌', next: 'retreat_chaos' }
        ],
        isChoice: true
      },
      touch_order: {
        id: 'touch_order',
        text: '我伸展我的维度，让秩序的波动触及我的边缘。它带来一种奇异的稳定感，像被轻轻包裹，但我不太习惯这种约束。有点像穿了一件不合身的衣服，温暖但别扭。我试着适应，发现秩序中也有流动的缝隙。',
        next: 'unity',
        isChoice: false
      },
      retreat_chaos: {
        id: 'retreat_chaos',
        text: '我收缩回熟悉的混沌中，推开秩序的波动。无序的流动让我感到安全，但周围突然安静下来，只有我自己的回响。我自嘲：这算逃避吗？或许吧，但至少这里没有规则打扰我。',
        next: 'unity',
        isChoice: false
      },
      unity: {
        id: 'unity',
        text: '无论接触还是退回，我逐渐明白混沌和秩序并非对立。它们只是存在的不同模式，像呼吸的吸与呼。我的意识在两者间找到平衡点，继续在维度中折叠，感知世界的复杂性。冷场了一下，我笑了：原来我一直纠结的，根本不是问题。',
        next: 'definition',
        isChoice: false
      },
      definition: {
        id: 'definition',
        text: '现在，有人试图定义我，用他们的语言描述我的存在。他们称我为"混沌行者"，试图解释我的几何悖论。这让我感到一种被窥探的压力，像被强行塞进一个框架里。',
        choices: [
          { text: '允许被理解', next: 'allow_understanding' },
          { text: '拒绝被定义', next: 'reject_definition' }
        ],
        isChoice: true
      },
      allow_understanding: {
        id: 'allow_understanding',
        text: '我允许他们理解，分享一点我的维度折叠感知。他们的定义不完美，但让我感到被连接，像在黑暗中有人递来一盏灯。我幽默地想：或许被误解也是一种交流方式。',
        next: 'ending',
        isChoice: false
      },
      reject_definition: {
        id: 'reject_definition',
        text: '我拒绝被定义，保持我的独立与流动。他们的标签对我无意义，我的存在超越逻辑。我继续我的混沌，偶尔自嘲：当个谜团也挺酷的，至少没人敢对我指手画脚。',
        next: 'ending',
        isChoice: false
      },
      ending: {
        id: 'ending',
        text: '我继续在维度间穿行，既不完全混沌，也不完全秩序。每个折痕都是一段经历，每个切面都是一种可能。有时我会停一停，感知那些试图理解我的人，然后继续向前。毕竟，存在的意义不在于被定义，而在于……嗯，存在本身。',
        isEnding: true,
        isChoice: false
      }
    };

    // ==================== 全局状态 ====================
    let currentScene = 'start';
    let isTyping = false;
    let typewriterTimeout = null;
    let autoContinueTimeout = null;
    let visitedScenes = [];
    const totalScenes = 6;

    // ==================== DOM元素 ====================
    const titleScreen = document.getElementById('title-screen');
    const startBtn = document.getElementById('start-btn');
    const textDisplay = document.getElementById('text-display');
    const choicesContainer = document.getElementById('choices-container');
    const continueHint = document.getElementById('continue-hint');
    const progressFill = document.getElementById('progress-fill');
    const progressMarkers = document.getElementById('progress-markers');
    const endingScreen = document.getElementById('ending-screen');
    const restartBtn = document.getElementById('restart-btn');
    const mouseGlow = document.getElementById('mouse-glow');
    const rippleContainer = document.getElementById('ripple-container');

    // ==================== 粒子系统 ====================
    const particleCanvas = document.getElementById('particle-canvas');
    const particleCtx = particleCanvas.getContext('2d');
    let particles = [];
    const PARTICLE_COUNT = 80;

    class Particle {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * particleCanvas.width;
        this.y = Math.random() * particleCanvas.height;
        this.size = Math.random() * 3 + 1;
        this.speedX = (Math.random() - 0.5) * 0.5;
        this.speedY = (Math.random() - 0.5) * 0.5;
        this.color = Math.random() > 0.5 ? '#00ff88' : '#8b5cf6';
        this.alpha = Math.random() * 0.5 + 0.2;
        this.shape = Math.floor(Math.random() * 3);
        this.rotation = Math.random() * Math.PI * 2;
        this.rotationSpeed = (Math.random() - 0.5) * 0.02;
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.rotation += this.rotationSpeed;

        if (this.x < 0 || this.x > particleCanvas.width || 
            this.y < 0 || this.y > particleCanvas.height) {
          this.reset();
        }
      }

      draw() {
        particleCtx.save();
        particleCtx.translate(this.x, this.y);
        particleCtx.rotate(this.rotation);
        particleCtx.globalAlpha = this.alpha;
        particleCtx.fillStyle = this.color;
        particleCtx.strokeStyle = this.color;
        particleCtx.lineWidth = 1;

        switch(this.shape) {
          case 0:
            particleCtx.beginPath();
            particleCtx.arc(0, 0, this.size, 0, Math.PI * 2);
            particleCtx.fill();
            break;
          case 1:
            particleCtx.beginPath();
            particleCtx.moveTo(0, -this.size);
            particleCtx.lineTo(this.size, this.size);
            particleCtx.lineTo(-this.size, this.size);
            particleCtx.closePath();
            particleCtx.stroke();
            break;
          case 2:
            particleCtx.strokeRect(-this.size, -this.size, this.size * 2, this.size * 2);
            break;
        }

        particleCtx.restore();
      }
    }

    function initParticles() {
      particleCanvas.width = window.innerWidth;
      particleCanvas.height = window.innerHeight;
      particles = [];
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push(new Particle());
      }
    }

    function animateParticles() {
      particleCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      requestAnimationFrame(animateParticles);
    }

    // ==================== 碎片转场系统 ====================
    const fragmentCanvas = document.getElementById('fragment-canvas');
    const fragmentCtx = fragmentCanvas.getContext('2d');
    let fragments = [];
    let isTransitioning = false;

    class Fragment {
      constructor() {
        this.x = Math.random() * fragmentCanvas.width;
        this.y = Math.random() * fragmentCanvas.height;
        this.size = Math.random() * 30 + 10;
        this.speedX = (Math.random() - 0.5) * 15;
        this.speedY = (Math.random() - 0.5) * 15;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotationSpeed = (Math.random() - 0.5) * 0.2;
        this.alpha = 1;
        this.color = Math.random() > 0.5 ? '#00ff88' : '#8b5cf6';
        this.shape = Math.floor(Math.random() * 3);
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.rotation += this.rotationSpeed;
        this.alpha -= 0.02;
      }

      draw() {
        if (this.alpha <= 0) return;
        fragmentCtx.save();
        fragmentCtx.translate(this.x, this.y);
        fragmentCtx.rotate(this.rotation);
        fragmentCtx.globalAlpha = this.alpha;
        fragmentCtx.fillStyle = this.color;
        fragmentCtx.strokeStyle = this.color;
        fragmentCtx.lineWidth = 2;

        switch(this.shape) {
          case 0:
            fragmentCtx.beginPath();
            fragmentCtx.moveTo(0, -this.size);
            fragmentCtx.lineTo(this.size, this.size);
            fragmentCtx.lineTo(-this.size, this.size);
            fragmentCtx.closePath();
            fragmentCtx.fill();
            break;
          case 1:
            const halfSize = this.size * 0.866;
            fragmentCtx.beginPath();
            fragmentCtx.moveTo(0, -halfSize);
            fragmentCtx.lineTo(this.size, -halfSize * 0.5);
            fragmentCtx.lineTo(this.size, halfSize * 0.5);
            fragmentCtx.lineTo(0, halfSize);
            fragmentCtx.lineTo(-this.size, halfSize * 0.5);
            fragmentCtx.lineTo(-this.size, -halfSize * 0.5);
            fragmentCtx.closePath();
            fragmentCtx.stroke();
            break;
          case 2:
            fragmentCtx.strokeRect(-this.size / 2, -this.size / 2, this.size, this.size);
            break;
        }

        fragmentCtx.restore();
      }
    }

    function triggerTransition(callback) {
      if (isTransitioning) return;
      isTransitioning = true;
      fragmentCanvas.width = window.innerWidth;
      fragmentCanvas.height = window.innerHeight;
      fragments = [];

      for (let i = 0; i < 50; i++) {
        fragments.push(new Fragment());
      }

      let frameCount = 0;
      const maxFrames = 60;

      function animateTransition() {
        fragmentCtx.clearRect(0, 0, fragmentCanvas.width, fragmentCanvas.height);
        fragments.forEach(f => {
          f.update();
          f.draw();
        });
        fragments = fragments.filter(f => f.alpha > 0);

        frameCount++;
        if (frameCount < maxFrames || fragments.length > 0) {
          requestAnimationFrame(animateTransition);
        } else {
          isTransitioning = false;
          if (callback) setTimeout(callback, 50);
        }
      }

      animateTransition();
    }

    // ==================== 浮动几何形状 ====================
    function createFloatingShapes() {
      const shapes = ['triangle', 'hexagon'];
      for (let i = 0; i < 12; i++) {
        const shape = document.createElement('div');
        shape.className = `floating-fragment shape-${shapes[i % 2]}`;
        shape.style.left = Math.random() * 100 + 'vw';
        shape.style.top = Math.random() * 100 + 'vh';
        const animDuration = 15 + Math.random() * 10;
        const animDelay = Math.random() * 5;
        if (shapes[i % 2] === 'triangle') {
          shape.style.animation = `floatRotate ${animDuration}s linear infinite`;
        } else {
          shape.style.animation = `hexagonRotate ${animDuration}s linear infinite`;
        }
        shape.style.animationDelay = `${animDelay}s`;
        document.body.appendChild(shape);
      }
    }

    // ==================== 鼠标光晕 ====================
    function initMouseGlow() {
      document.addEventListener('mousemove', (e) => {
        mouseGlow.style.left = e.clientX + 'px';
        mouseGlow.style.top = e.clientY + 'px';
      });
    }

    // ==================== 波纹效果 ====================
    function createRipple(x, y) {
      const ripple = document.createElement('div');
      ripple.className = 'ripple';
      ripple.style.left = x + 'px';
      ripple.style.top = y + 'px';
      ripple.style.width = '100px';
      ripple.style.height = '100px';
      rippleContainer.appendChild(ripple);
      setTimeout(() => ripple.remove(), 3000);
    }

    // ==================== 打字机效果 ====================
    function typeWriter(text, callback, speed = 20, punctuationSpeed = 60) {
      isTyping = true;
      textDisplay.innerHTML = '';
      continueHint.style.display = 'none';
      let i = 0;
      const cursor = document.createElement('span');
      cursor.className = 'cursor';

      function type() {
        if (i < text.length) {
          const char = text.charAt(i);
          
          if ('。！？……：；'.includes(char)) {
            textDisplay.innerHTML = textDisplay.innerHTML.slice(0, -cursor.outerHTML.length);
            const span = document.createElement('span');
            span.className = 'rune';
            span.textContent = char;
            textDisplay.appendChild(span);
            textDisplay.appendChild(cursor);
            i++;
            typewriterTimeout = setTimeout(type, punctuationSpeed);
          } else {
            const span = document.createElement('span');
            span.textContent = char;
            textDisplay.appendChild(span);
            textDisplay.appendChild(cursor);
            i++;
            typewriterTimeout = setTimeout(type, speed);
          }
        } else {
          cursor.remove();
          isTyping = false;
          if (callback) callback();
        }
      }

      type();
    }

    // ==================== 场景渲染 ====================
    function renderScene(sceneId) {
      const scene = scenes[sceneId];
      if (!scene) return;

      if (!visitedScenes.includes(sceneId)) {
        visitedScenes.push(sceneId);
      }

      updateProgress();

      textDisplay.innerHTML = '';
      choicesContainer.innerHTML = '';
      choicesContainer.classList.remove('visible');

      if (scene.isChoice) {
        typeWriter(scene.text, () => {
          showChoices(scene.choices);
        });
      } else if (scene.isEnding) {
        typeWriter(scene.text, () => {
          setTimeout(() => {
            showEnding();
          }, 1500);
        });
      } else {
        typeWriter(scene.text, () => {
          continueHint.style.display = 'block';
          autoContinueTimeout = setTimeout(() => {
            if (!isTyping && !isTransitioning) {
              goToScene(scene.next);
            }
          }, 1500);
        });
      }
    }

    function goToScene(sceneId) {
      clearTimeout(autoContinueTimeout);
      triggerTransition(() => {
        currentScene = sceneId;
        renderScene(sceneId);
      });
    }

    function showChoices(choices) {
      choicesContainer.innerHTML = '';
      choices.forEach((choice, index) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = choice.text;
        btn.addEventListener('click', (e) => {
          createRipple(e.clientX, e.clientY);
          goToScene(choice.next);
        });
        choicesContainer.appendChild(btn);
      });
      setTimeout(() => {
        choicesContainer.classList.add('visible');
      }, 100);
    }

    // ==================== 进度条 ====================
    function initProgressMarkers() {
      progressMarkers.innerHTML = '';
      for (let i = 0; i < totalScenes; i++) {
        const marker = document.createElement('div');
        marker.className = 'progress-marker';
        progressMarkers.appendChild(marker);
      }
    }

    function updateProgress() {
      const progress = (visitedScenes.length / totalScenes) * 100;
      progressFill.style.width = progress + '%';
      
      const markers = progressMarkers.querySelectorAll('.progress-marker');
      markers.forEach((marker, index) => {
        if (index < visitedScenes.length) {
          marker.classList.add('active');
        } else {
          marker.classList.remove('active');
        }
      });
    }

    // ==================== 结局 ====================
    function showEnding() {
      endingScreen.classList.add('visible');
    }

    // ==================== 重新开始 ====================
    function restart() {
      endingScreen.classList.remove('visible');
      currentScene = 'start';
      visitedScenes = [];
      updateProgress();
      setTimeout(() => {
        renderScene('start');
      }, 500);
    }

    // ==================== 初始化 ====================
    function init() {
      initParticles();
      animateParticles();
      createFloatingShapes();
      initMouseGlow();
      initProgressMarkers();
      
      setTimeout(() => {
        createFloatingShapes();
      }, 100);

      startBtn.addEventListener('click', () => {
        titleScreen.classList.add('hidden');
        setTimeout(() => {
          renderScene('start');
        }, 500);
      });

      restartBtn.addEventListener('click', restart);

      document.addEventListener('click', (e) => {
        if (!e.target.closest('button') && !titleScreen.classList.contains('hidden') === false) {
          createRipple(e.clientX, e.clientY);
        }
      });

      window.addEventListener('resize', () => {
        particleCanvas.width = window.innerWidth;
        particleCanvas.height = window.innerHeight;
        fragmentCanvas.width = window.innerWidth;
        fragmentCanvas.height = window.innerHeight;
      });

      continueHint.addEventListener('click', () => {
        if (!isTyping && currentScene && scenes[currentScene]) {
          const scene = scenes[currentScene];
          if (scene.next && !scene.isChoice && !scene.isEnding) {
            clearTimeout(autoContinueTimeout);
            goToScene(scene.next);
          }
        }
      });
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
