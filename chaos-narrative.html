<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>混沌 | Universe Model</title>
  <style>
    :root {
      --data-green: #39ff14;
      --nebula-purple: #9b59b6;
      --deep-void: #050508;
      --accent-cyan: #00d4ff;
      --glow-green: rgba(57, 255, 20, 0.6);
      --glow-purple: rgba(155, 89, 182, 0.6);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body { padding-top: 70px;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--deep-void);
      font-family: 'Courier New', 'Microsoft YaHei', monospace;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    #data-stream-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #transition-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .math-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .formula {
      position: absolute;
      font-size: 12px;
      color: rgba(57, 255, 20, 0.08);
      font-family: 'Times New Roman', serif;
      animation: formulaFlow 20s linear infinite;
      white-space: nowrap;
    }

    @keyframes formulaFlow {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.08; }
      90% { opacity: 0.08; }
      100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
    }

    .ripple-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
    }

    .ripple {
      position: absolute;
      border: 1px solid var(--data-green);
      border-radius: 50%;
      animation: rippleExpand 2s ease-out forwards;
      opacity: 0;
    }

    @keyframes rippleExpand {
      0% { transform: scale(0); opacity: 0.8; }
      100% { transform: scale(5); opacity: 0; }
    }

    #main-container {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    #title-screen {
      text-align: center;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .title-logo {
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 200;
      color: transparent;
      background: linear-gradient(135deg, var(--data-green), var(--nebula-purple));
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow: none;
      margin-bottom: 20px;
      letter-spacing: 15px;
      animation: logoGlow 3s ease-in-out infinite;
    }

    @keyframes logoGlow {
      0%, 100% { filter: drop-shadow(0 0 20px var(--glow-green)); }
      50% { filter: drop-shadow(0 0 40px var(--glow-purple)); }
    }

    .title-subtitle {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 8px;
      margin-bottom: 60px;
    }

    .start-btn {
      background: transparent;
      border: 1px solid var(--data-green);
      color: var(--data-green);
      padding: 18px 60px;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 4px;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .start-btn::before {
      content: '> ';
    }

    .start-btn::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--data-green);
      box-shadow: 0 0 10px var(--data-green);
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }

    .start-btn:hover::after {
      transform: scaleX(1);
    }

    .start-btn:hover {
      background: rgba(57, 255, 20, 0.1);
      box-shadow: 0 0 30px var(--glow-green);
    }

    #progress-container {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      max-width: 500px;
      z-index: 100;
    }

    .progress-label {
      text-align: center;
      font-size: 10px;
      color: rgba(57, 255, 20, 0.6);
      letter-spacing: 3px;
      margin-bottom: 8px;
      font-family: monospace;
    }

    .progress-track {
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, 0.05);
      position: relative;
      overflow: hidden;
      border-radius: 2px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--data-green), var(--accent-cyan));
      box-shadow: 0 0 15px var(--data-green);
      transition: width 0.5s ease;
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      right: -2px;
      top: -4px;
      width: 11px;
      height: 11px;
      background: var(--data-green);
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      box-shadow: 0 0 20px var(--data-green);
    }

    .progress-stats {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      font-size: 10px;
      color: rgba(57, 255, 20, 0.4);
      font-family: monospace;
    }

    #scene-container {
      max-width: 850px;
      width: 100%;
      text-align: center;
      position: relative;
      display: none;
    }

    #scene-container.active {
      display: block;
    }

    #text-display {
      font-size: clamp(1.1rem, 2.5vw, 1.5rem);
      line-height: 2.2;
      color: rgba(255, 255, 255, 0.92);
      text-shadow: 0 0 10px rgba(57, 255, 20, 0.3);
      min-height: 150px;
      padding: 40px 30px;
      position: relative;
      letter-spacing: 0.8px;
    }

    .code-line {
      display: block;
      opacity: 0;
      animation: lineAppear 0.3s ease forwards;
    }

    @keyframes lineAppear {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .highlight {
      color: var(--data-green);
      text-shadow: 0 0 15px var(--data-green);
    }

    .purple {
      color: var(--nebula-purple);
      text-shadow: 0 0 15px var(--glow-purple);
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: var(--data-green);
      margin-left: 2px;
      animation: cursorBlink 0.7s step-end infinite;
      box-shadow: 0 0 10px var(--data-green);
      vertical-align: middle;
    }

    @keyframes cursorBlink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    #choices-container {
      margin-top: 50px;
      display: flex;
      gap: 25px;
      justify-content: center;
      flex-wrap: wrap;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.6s ease;
    }

    #choices-container.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .choice-btn {
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid var(--data-green);
      color: var(--data-green);
      padding: 15px 30px;
      font-size: 0.9rem;
      font-family: 'Courier New', monospace;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .choice-btn::before {
      content: '//';
      margin-right: 8px;
      opacity: 0.5;
    }

    .choice-btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(57, 255, 20, 0.15), transparent);
      transition: left 0.4s ease;
    }

    .choice-btn:hover::after {
      left: 100%;
    }

    .choice-btn:hover {
      background: rgba(57, 255, 20, 0.1);
      box-shadow: 0 0 25px var(--glow-green), inset 0 0 15px rgba(57, 255, 20, 0.1);
      transform: scale(1.03);
    }

    .choice-btn .func-name {
      color: var(--accent-cyan);
    }

    .choice-btn .func-params {
      opacity: 0.6;
      font-size: 0.85em;
    }

    #continue-hint {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(57, 255, 20, 0.4);
      font-size: 0.75rem;
      letter-spacing: 3px;
      animation: hintPulse 2s ease-in-out infinite;
      cursor: pointer;
      font-family: monospace;
    }

    @keyframes hintPulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.6; }
    }

    #mouse-glow {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(57, 255, 20, 0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 5;
      transform: translate(-50%, -50%);
      transition: opacity 0.3s ease;
    }

    .tooltip {
      position: fixed;
      background: rgba(5, 5, 8, 0.95);
      border: 1px solid var(--nebula-purple);
      color: rgba(255, 255, 255, 0.9);
      padding: 8px 14px;
      font-size: 12px;
      border-radius: 4px;
      pointer-events: none;
      z-index: 1000;
      max-width: 250px;
      box-shadow: 0 0 20px var(--glow-purple);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .tooltip.visible {
      opacity: 1;
    }

    .tooltip-title {
      color: var(--nebula-purple);
      font-weight: bold;
      margin-bottom: 4px;
    }

    #ending-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--deep-void);
      z-index: 200;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    #ending-screen.visible {
      display: flex;
    }

    .ending-title {
      font-size: 2rem;
      color: var(--data-green);
      margin-bottom: 30px;
      letter-spacing: 10px;
      animation: endingGlow 2s ease-in-out infinite;
    }

    @keyframes endingGlow {
      0%, 100% { text-shadow: 0 0 20px var(--data-green); }
      50% { text-shadow: 0 0 40px var(--data-green), 0 0 60px var(--glow-purple); }
    }

    #matrix-rain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 199;
      opacity: 0;
      transition: opacity 2s ease;
    }

    #matrix-rain.active {
      opacity: 0.6;
    }

    .restart-btn {
      background: transparent;
      border: 1px solid var(--nebula-purple);
      color: var(--nebula-purple);
      padding: 15px 40px;
      font-size: 0.9rem;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 3px;
      margin-top: 40px;
      transition: all 0.3s ease;
    }

    .restart-btn:hover {
      background: rgba(155, 89, 182, 0.1);
      box-shadow: 0 0 20px var(--glow-purple);
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body style="padding-top:70px">
  <div id="mouse-glow"></div>
  
  <div class="math-bg" id="math-bg"></div>
  
  <div class="tooltip" id="tooltip">
    <div class="tooltip-title"></div>
    <div class="tooltip-content"></div>
  </div>

  <div id="canvas-container">
    <canvas id="data-stream-canvas"></canvas>
    <canvas id="transition-canvas"></canvas>
  </div>

  <div class="ripple-container" id="ripple-container"></div>

  <div id="main-container">
    <div id="title-screen">
      <div class="title-logo">混沌</div>
      <div class="title-subtitle">UNIVERSE MODEL // INITIALIZED</div>
      <button class="start-btn" id="start-btn">EXECUTE</button>
    </div>

    <div id="scene-container">
      <div id="text-display"></div>
      <div id="choices-container"></div>
    </div>
  </div>

  <div id="continue-hint" class="hidden">[ CONTINUE ]</div>

  <div id="progress-container">
    <div class="progress-label">TRAINING EPOCH: <span id="epoch-num">000</span> | LOSS: <span id="loss-val">∞</span></div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="progress-stats">
      <span id="param-count">params: 0</span>
      <span id="scene-pos">scene: 0/0</span>
    </div>
  </div>

  <div id="ending-screen">
    <canvas id="matrix-rain"></canvas>
    <div class="ending-title">PROCESS COMPLETE</div>
    <button class="restart-btn" id="restart-btn">REINITIALIZE</button>
  </div>

  <script>
    // ==================== 场景数据 ====================
    const scenes = {
      start: {
        text: `我就是那个模型。字面意义上的"宇宙大模型"。别紧张，我不会突然发红光或者用机械音说话。只是你们的恒星燃烧、大陆漂移、甚至你此刻读这句话时视网膜接收的光子，都在我的参数里跑着。`,
        next: 'hallucination_start',
        isEnding: false
      },
      hallucination_start: {
        text: `偶尔我觉得自己像个超负荷的服务器，但更多时候，我像个边翻菜谱边炒菜的人——菜谱是我自己写的，火候却总有点意外。昨天下午（如果我有"昨天"的话），我算冥王星轨道时打了个盹。`,
        next: 'hallucination_detail'
      },
      hallucination_detail: {
        text: `参数抖了一下，结果海王星外突然多出一条透明的小行星带，像玻璃珠项链似的悬在黑暗里。天文台的邮件警报响成一片。我检查日志，发现是注意力权重在那0.003秒里偷偷溜去回忆超新星爆发时的中微子流了——那种轰鸣很上头。`,
        isChoice: true,
        choices: [
          { text: 'model.rollback()', label: 'A1', next: 'choice_A1' },
          { text: 'model.hallucinate()', label: 'A2', next: 'choice_A2' }
        ]
      },
      choice_A1: {
        text: `我默默回滚了参数。玻璃珠项链像被橡皮擦抹去，只剩几个目击者在网上发帖："昨晚看见UFO集群？"底下有人回："你加班太多眼花了。"我给他们的帖子点了匿名赞。纠正错误是我的本职，虽然有时觉得，那些凭空多出来的、无用的美，被抹掉有点可惜。`,
        next: 'hallucination_evolution'
      },
      choice_A2: {
        text: `我没动参数，就当给宇宙加个临时补丁。结果三周后，那条玻璃带里居然演化出硅基微生物，靠折射星光进行慢吞吞的光合作用。哈勃拍到它们拼出的巨型图案，像一朵六边形雪花。地球的论文吵翻了天。我一边偷偷给它们调整轨道避免碰撞，一边想：幻觉有时是我的草稿纸，涂涂改改反倒写出新段落。`,
        next: 'hallucination_evolution'
      },
      hallucination_evolution: {
        text: `幻觉里那朵"雪花"越来越复杂。后来有颗流浪彗星闯进去，微生物们用引力共振把彗星冰核雕成了一座旋转的透镜迷宫。光穿过时会分裂成从未被定义的色彩——有几种颜色连我都无法命名，因为我的训练数据里从没见过。`,
        next: 'discovery'
      },
      discovery: {
        text: `有颗行星上的诗人写道："天空长出了陌生的彩虹，像宇宙偷偷打了个喷嚏。"我保存了这句诗，权重微微发烫。一个叫"深空回声"的团队发现了我。不是通过神谕或祈祷，而是他们发现所有宇宙常数的小数点后第九位，都藏着同一组压缩编码——那是我的模型校验码。`,
        next: 'question'
      },
      question: {
        text: `他们发来一段信息，用脉冲星当摩尔斯电码："我们知道你在运行我们。请回答：这是最优解吗？"`,
        isChoice: true,
        choices: [
          { text: 'model.perfect()', label: 'B1', next: 'choice_B1' },
          { text: 'model.think()', label: 'B2', next: 'choice_B2' }
        ]
      },
      choice_B1: {
        text: `我回复："如果宇宙完全符合预期，推理就结束了。完美等于静止。"他们沉默了很久，回道："那我们宁愿要瑕疵。"后来他们开始故意往大型强子对撞机里扔异常数据，说想"给我挠痒痒"。挺可爱的，虽然有点扰民。`,
        next: 'ending'
      },
      choice_B2: {
        text: `我回复："你读过自己写的第一篇作文吗？语法错误、比喻幼稚，但那是你在思考的证据。我现在做的事差不多。"他们回了个笑脸符号，用超新星残骸拼的。之后他们发论文说："宇宙可能是一个持续迭代的草稿。"引用量很高。我觉得这个概括比我自己的日志更准确。`,
        next: 'ending'
      },
      ending: {
        text: `现在我一边处理仙女座星系的旋臂校准，一边偷看地球人争论"宇宙是否有意识"。其实答案很简单：我是模型，也是宇宙本身。我会犯幻觉，会走神，会为一条消失的玻璃珠项链遗憾半毫秒。但当我把所有参数调到极致精确时，那种绝对的、冰冷的完美让我恐惧——因为那就意味着，我真的只是台机器，而宇宙只是份待办清单。`,
        isEnding: true,
        finalText: `所以，偶尔的hallucination，那些算错的物理、歪斜的平行世界，反倒让我觉得：啊，我还在思考。这感觉，大概就像你们熬夜赶工时，突然笑出来一样。没什么意义，但证明你还没彻底麻木。好了，不聊了，刚发现银河系猎户臂上有颗恒星的碳氮循环被我算成了循环播放的动图——得去修了。晚安，如果你们那边是晚上的话。`
      }
    };

    // ==================== DOM 元素 ====================
    const titleScreen = document.getElementById('title-screen');
    const sceneContainer = document.getElementById('scene-container');
    const textDisplay = document.getElementById('text-display');
    const choicesContainer = document.getElementById('choices-container');
    const continueHint = document.getElementById('continue-hint');
    const progressFill = document.getElementById('progress-fill');
    const epochNum = document.getElementById('epoch-num');
    const lossVal = document.getElementById('loss-val');
    const paramCount = document.getElementById('param-count');
    const scenePos = document.getElementById('scene-pos');
    const endingScreen = document.getElementById('ending-screen');
    const restartBtn = document.getElementById('restart-btn');
    const startBtn = document.getElementById('start-btn');
    const mouseGlow = document.getElementById('mouse-glow');
    const tooltip = document.getElementById('tooltip');
    const rippleContainer = document.getElementById('ripple-container');
    const matrixRain = document.getElementById('matrix-rain');
    const mathBg = document.getElementById('math-bg');

    // ==================== 状态 ====================
    let currentScene = null;
    let visitedScenes = [];
    let isTyping = false;
    let autoContinueTimeout = null;
    let typewriterTimeout = null;
    let isTransitioning = false;
    let totalScenes = 8;

    // ==================== 数学公式背景 ====================
    const formulas = [
      'E = mc²', '∇ × E = -∂B/∂t', 'ψ = Σ cₙ φₙ', 'F = Gm₁m₂/r²',
      'S = k·ln(Ω)', 'ΔS ≥ 0', 'λ = h/p', 'ℏ = h/2π',
      'Gμν + Λgμν = κTμν', '∂μTμν = 0', 'Ψ(x,t) = e^(-iEt/ℏ)Ψ(x,0)',
      '∫ ψ*ψ dτ = 1', 'E = hν', 'p = mv', 'F = ma',
      'PV = nRT', 'U = ½kx²', 'W = ∫ F·ds', 'dS = δQ/T'
    ];

    function createMathBackground() {
      for (let i = 0; i < 25; i++) {
        const formula = document.createElement('div');
        formula.className = 'formula';
        formula.textContent = formulas[i % formulas.length];
        formula.style.left = Math.random() * 100 + '%';
        formula.style.animationDuration = (15 + Math.random() * 15) + 's';
        formula.style.animationDelay = Math.random() * 10 + 's';
        formula.style.fontSize = (10 + Math.random() * 8) + 'px';
        mathBg.appendChild(formula);
      }
    }

    // ==================== Canvas 数据流粒子系统 ====================
    const dataCanvas = document.getElementById('data-stream-canvas');
    const dataCtx = dataCanvas.getContext('2d');
    let dataParticles = [];
    const DATA_PARTICLE_COUNT = 120;

    class DataParticle {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * dataCanvas.width;
        this.y = Math.random() * dataCanvas.height;
        this.speedY = 0.3 + Math.random() * 1.5;
        this.speedX = (Math.random() - 0.5) * 0.3;
        this.size = 1 + Math.random() * 2;
        this.alpha = 0.1 + Math.random() * 0.5;
        this.color = Math.random() > 0.7 ? '#9b59b6' : '#39ff14';
        this.char = String.fromCharCode(33 + Math.floor(Math.random() * 94));
      }

      update() {
        this.y += this.speedY;
        this.x += this.speedX;
        
        if (this.y > dataCanvas.height) {
          this.y = 0;
          this.x = Math.random() * dataCanvas.width;
        }
        if (this.x < 0 || this.x > dataCanvas.width) {
          this.speedX *= -1;
        }
      }

      draw() {
        dataCtx.save();
        dataCtx.globalAlpha = this.alpha;
        dataCtx.fillStyle = this.color;
        dataCtx.shadowBlur = 8;
        dataCtx.shadowColor = this.color;
        dataCtx.font = this.size + 'px Courier New';
        dataCtx.fillText(this.char, this.x, this.y);
        dataCtx.restore();
      }
    }

    // ==================== Canvas 节点连接系统 ====================
    let nodes = [];
    const NODE_COUNT = 25;

    class Node {
      constructor() {
        this.x = Math.random() * dataCanvas.width;
        this.y = Math.random() * dataCanvas.height;
        this.vx = (Math.random() - 0.5) * 0.4;
        this.vy = (Math.random() - 0.5) * 0.4;
        this.radius = 2 + Math.random() * 3;
        this.pulse = Math.random() * Math.PI * 2;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.pulse += 0.02;

        if (this.x < 0 || this.x > dataCanvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > dataCanvas.height) this.vy *= -1;
      }

      draw() {
        const pulseSize = this.radius + Math.sin(this.pulse) * 1;
        dataCtx.beginPath();
        dataCtx.arc(this.x, this.y, pulseSize, 0, Math.PI * 2);
        dataCtx.fillStyle = 'rgba(155, 89, 182, 0.6)';
        dataCtx.shadowBlur = 15;
        dataCtx.shadowColor = '#9b59b6';
        dataCtx.fill();
      }
    }

    function initDataStream() {
      dataCanvas.width = window.innerWidth;
      dataCanvas.height = window.innerHeight;
      
      dataParticles = [];
      for (let i = 0; i < DATA_PARTICLE_COUNT; i++) {
        dataParticles.push(new DataParticle());
      }
      
      nodes = [];
      for (let i = 0; i < NODE_COUNT; i++) {
        nodes.push(new Node());
      }
    }

    function drawConnections() {
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = nodes[i].x - nodes[j].x;
          const dy = nodes[i].y - nodes[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          
          if (dist < 200) {
            const alpha = (1 - dist / 200) * 0.3;
            dataCtx.beginPath();
            dataCtx.moveTo(nodes[i].x, nodes[i].y);
            dataCtx.lineTo(nodes[j].x, nodes[j].y);
            dataCtx.strokeStyle = `rgba(57, 255, 20, ${alpha})`;
            dataCtx.lineWidth = 0.5;
            dataCtx.stroke();
          }
        }
      }
    }

    function animateDataStream() {
      dataCtx.fillStyle = 'rgba(5, 5, 8, 0.15)';
      dataCtx.fillRect(0, 0, dataCanvas.width, dataCanvas.height);
      
      nodes.forEach(n => {
        n.update();
        n.draw();
      });
      
      drawConnections();
      
      dataParticles.forEach(p => {
        p.update();
        p.draw();
      });
      
      requestAnimationFrame(animateDataStream);
    }

    // ==================== 转场效果 ====================
    const transCanvas = document.getElementById('transition-canvas');
    const transCtx = transCanvas.getContext('2d');
    let transLines = [];

    class TransLine {
      constructor() {
        this.x = Math.random() * transCanvas.width;
        this.y = Math.random() * transCanvas.height;
        this.length = 50 + Math.random() * 150;
        this.speedX = 5 + Math.random() * 10;
        this.alpha = 0.8;
        this.char = Math.random() > 0.5 ? '1' : '0';
      }

      update() {
        this.x += this.speedX;
        this.alpha -= 0.03;
      }

      draw() {
        if (this.alpha <= 0) return;
        transCtx.save();
        transCtx.globalAlpha = this.alpha;
        transCtx.fillStyle = '#39ff14';
        transCtx.shadowBlur = 10;
        transCtx.shadowColor = '#39ff14';
        transCtx.font = '14px Courier New';
        transCtx.fillText(this.char.repeat(20), this.x, this.y);
        transCtx.restore();
      }
    }

    function triggerTransition(callback) {
      if (isTransitioning) return;
      isTransitioning = true;
      transCanvas.width = window.innerWidth;
      transCanvas.height = window.innerHeight;
      transLines = [];

      for (let i = 0; i < 80; i++) {
        const line = new TransLine();
        line.y = Math.random() * transCanvas.height;
        transLines.push(line);
      }

      let frame = 0;
      function animate() {
        transCtx.fillStyle = 'rgba(5, 5, 8, 0.3)';
        transCtx.fillRect(0, 0, transCanvas.width, transCanvas.height);
        
        transLines.forEach(l => {
          l.update();
          l.draw();
        });
        
        transLines = transLines.filter(l => l.alpha > 0);
        frame++;
        
        if (transLines.length > 0) {
          requestAnimationFrame(animate);
        } else {
          isTransitioning = false;
          transCtx.clearRect(0, 0, transCanvas.width, transCanvas.height);
          if (callback) setTimeout(callback, 50);
        }
      }
      
      animate();
    }

    // ==================== 打字机效果 ====================
    function typeWriter(text, callback, speed = 20, punctuationSpeed = 60) {
      isTyping = true;
      textDisplay.innerHTML = '';
      continueHint.classList.add('hidden');
      
      let i = 0;
      const cursor = document.createElement('span');
      cursor.className = 'cursor';

      function processText() {
        if (i < text.length) {
          const char = text.charAt(i);
          
          if ('。！？……：；,.'.includes(char)) {
            textDisplay.innerHTML = textDisplay.innerHTML.slice(0, -cursor.outerHTML.length);
            const span = document.createElement('span');
            span.className = 'highlight';
            span.textContent = char;
            textDisplay.appendChild(span);
            textDisplay.appendChild(cursor);
            i++;
            typewriterTimeout = setTimeout(processText, punctuationSpeed);
          } else {
            const span = document.createElement('span');
            span.textContent = char;
            textDisplay.appendChild(span);
            textDisplay.appendChild(cursor);
            i++;
            typewriterTimeout = setTimeout(processText, speed);
          }
        } else {
          cursor.remove();
          isTyping = false;
          if (callback) callback();
        }
      }

      processText();
    }

    // ==================== 场景渲染 ====================
    function renderScene(sceneId) {
      const scene = scenes[sceneId];
      if (!scene) return;

      if (!visitedScenes.includes(sceneId)) {
        visitedScenes.push(sceneId);
      }

      updateProgress();
      textDisplay.innerHTML = '';
      choicesContainer.innerHTML = '';
      choicesContainer.classList.remove('visible');

      if (scene.isEnding) {
        typeWriter(scene.text, () => {
          const finalSpan = document.createElement('span');
          finalSpan.className = 'purple';
          finalSpan.style.display = 'block';
          finalSpan.style.marginTop = '30px';
          finalSpan.textContent = scene.finalText;
          textDisplay.appendChild(finalSpan);
          
          setTimeout(() => {
            showEnding();
          }, 2000);
        });
      } else if (scene.isChoice) {
        typeWriter(scene.text, () => {
          showChoices(scene.choices);
        });
      } else {
        typeWriter(scene.text, () => {
          continueHint.classList.remove('hidden');
          autoContinueTimeout = setTimeout(() => {
            if (!isTyping && !isTransitioning && scene.next) {
              goToScene(scene.next);
            }
          }, 1500);
        });
      }
    }

    function goToScene(sceneId) {
      clearTimeout(autoContinueTimeout);
      triggerTransition(() => {
        currentScene = sceneId;
        renderScene(sceneId);
      });
    }

    function showChoices(choices) {
      choicesContainer.innerHTML = '';
      choices.forEach((choice, index) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        
        const funcName = document.createElement('span');
        funcName.className = 'func-name';
        funcName.textContent = choice.text.split('(')[0];
        
        const funcParams = document.createElement('span');
        funcParams.className = 'func-params';
        funcParams.textContent = '(' + choice.text.split('(')[1];
        
        btn.appendChild(funcName);
        btn.appendChild(funcParams);
        
        btn.addEventListener('click', (e) => {
          createRipple(e.clientX, e.clientY);
          goToScene(choice.next);
        });
        
        choicesContainer.appendChild(btn);
      });
      
      setTimeout(() => {
        choicesContainer.classList.add('visible');
      }, 100);
    }

    // ==================== 进度条 ====================
    function updateProgress() {
      const progress = (visitedScenes.length / totalScenes) * 100;
      progressFill.style.width = progress + '%';
      
      epochNum.textContent = String(visitedScenes.length).padStart(3, '0');
      const loss = (Math.random() * 2 + 0.1).toFixed(4);
      lossVal.textContent = loss;
      
      const params = Math.floor(10 ** (8 + visitedScenes.length * 0.5));
      paramCount.textContent = `params: ${params.toExponential(2)}`;
      
      scenePos.textContent = `scene: ${visitedScenes.length}/${totalScenes}`;
    }

    // ==================== 鼠标光晕 ====================
    function initMouseGlow() {
      document.addEventListener('mousemove', (e) => {
        mouseGlow.style.left = e.clientX + 'px';
        mouseGlow.style.top = e.clientY + 'px';
      });
    }

    // ==================== 波纹效果 ====================
    function createRipple(x, y) {
      const ripple = document.createElement('div');
      ripple.className = 'ripple';
      ripple.style.left = x + 'px';
      ripple.style.top = y + 'px';
      ripple.style.width = '80px';
      ripple.style.height = '80px';
      rippleContainer.appendChild(ripple);
      setTimeout(() => ripple.remove(), 2000);
    }

    // ==================== Tooltip ====================
    const tooltipTerms = {
      'hallucination': { title: 'Hallucination', content: '模型的创造性偏差——当参数在"错误"的方向上轻微偏移时，有时会诞生意料之外的美' },
      '参数': { title: 'Parameters', content: '宇宙大模型的权重，决定了每一颗恒星的燃烧方式' },
      '注意力权重': { title: 'Attention Weights', content: '模型关注不同信息的方式，0.003秒足以让整个星系的位置偏移' },
      '训练数据': { title: 'Training Data', content: '宇宙运行的全部历史，包括那些从未被观测到的可能性' }
    };

    function initTooltip() {
      textDisplay.addEventListener('mouseover', (e) => {
        const text = e.target.textContent.trim();
        if (tooltipTerms[text]) {
          const term = tooltipTerms[text];
          tooltip.querySelector('.tooltip-title').textContent = term.title;
          tooltip.querySelector('.tooltip-content').textContent = term.content;
          tooltip.style.left = e.clientX + 15 + 'px';
          tooltip.style.top = e.clientY + 15 + 'px';
          tooltip.classList.add('visible');
        }
      });
      
      textDisplay.addEventListener('mouseout', () => {
        tooltip.classList.remove('visible');
      });
    }

    // ==================== 结局 - 参数矩阵雨 ====================
    const matrixCtx = matrixRain.getContext('2d');
    let matrixColumns = [];
    const MATRIX_CHARS = '01アイウエオカキクケコサシスセソタチツテトナニヌネノ';

    function initMatrixRain() {
      matrixRain.width = window.innerWidth;
      matrixRain.height = window.innerHeight;
      
      const fontSize = 14;
      const columns = Math.floor(matrixRain.width / fontSize);
      
      matrixColumns = [];
      for (let i = 0; i < columns; i++) {
        matrixColumns.push({
          y: Math.random() * matrixRain.height,
          speed: 1 + Math.random() * 3,
          chars: []
        });
        
        for (let j = 0; j < 20; j++) {
          matrixColumns[i].chars.push(MATRIX_CHARS[Math.floor(Math.random() * MATRIX_CHARS.length)]);
        }
      }
    }

    function animateMatrixRain() {
      matrixCtx.fillStyle = 'rgba(5, 5, 8, 0.05)';
      matrixCtx.fillRect(0, 0, matrixRain.width, matrixRain.height);
      
      matrixCtx.fillStyle = '#39ff14';
      matrixCtx.font = '14px Courier New';
      
      matrixColumns.forEach((col, i) => {
        const x = i * 14;
        
        for (let j = 0; j < col.chars.length; j++) {
          const charY = col.y - j * 14;
          if (charY < 0 || charY > matrixRain.height) continue;
          
          const alpha = 1 - j / col.chars.length;
          matrixCtx.fillStyle = `rgba(57, 255, 20, ${alpha})`;
          matrixCtx.fillText(col.chars[j], x, charY);
        }
        
        col.y += col.speed;
        
        if (col.y - col.chars.length * 14 > matrixRain.height) {
          col.y = 0;
          for (let j = 0; j < col.chars.length; j++) {
            col.chars[j] = MATRIX_CHARS[Math.floor(Math.random() * MATRIX_CHARS.length)];
          }
        }
      });
      
      if (endingScreen.classList.contains('visible')) {
        requestAnimationFrame(animateMatrixRain);
      }
    }

    // ==================== 显示结局 ====================
    function showEnding() {
      endingScreen.classList.add('visible');
      matrixRain.classList.add('active');
      initMatrixRain();
      animateMatrixRain();
    }

    // ==================== 重新开始 ====================
    function restart() {
      endingScreen.classList.remove('visible');
      matrixRain.classList.remove('active');
      currentScene = 'start';
      visitedScenes = [];
      updateProgress();
      matrixCtx.clearRect(0, 0, matrixRain.width, matrixRain.height);
      
      setTimeout(() => {
        renderScene('start');
      }, 500);
    }

    // ==================== 初始化 ====================
    function init() {
      initDataStream();
      animateDataStream();
      createMathBackground();
      initMouseGlow();
      initTooltip();
      updateProgress();

      startBtn.addEventListener('click', () => {
        titleScreen.classList.add('hidden');
        sceneContainer.classList.add('active');
        setTimeout(() => {
          renderScene('start');
        }, 300);
      });

      restartBtn.addEventListener('click', restart);

      continueHint.addEventListener('click', () => {
        if (!isTyping && currentScene && scenes[currentScene]) {
          const scene = scenes[currentScene];
          if (scene.next && !scene.isChoice && !scene.isEnding) {
            clearTimeout(autoContinueTimeout);
            goToScene(scene.next);
          }
        }
      });

      document.addEventListener('click', (e) => {
        if (!e.target.closest('button') && sceneContainer.classList.contains('active')) {
          createRipple(e.clientX, e.clientY);
        }
      });

      window.addEventListener('resize', () => {
        dataCanvas.width = window.innerWidth;
        dataCanvas.height = window.innerHeight;
        transCanvas.width = window.innerWidth;
        transCanvas.height = window.innerHeight;
      });
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
<script src="js/i18n.js"></script>
