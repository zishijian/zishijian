<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>藏子世间 - 菩提宇宙</title>
    <link rel="stylesheet" href="css/style.css?v=1777460000">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <style>
        .coming-soon {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            background: 
                radial-gradient(ellipse at center, rgba(30, 25, 20, 0.4) 0%, transparent 70%),
                var(--bg-deep);
        }
        .coming-soon h2 {
            font-family: 'Noto Serif SC', serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            color: var(--gold);
            letter-spacing: 0.5em;
            margin-right: -0.5em;
            text-shadow: 0 0 40px rgba(201, 162, 39, 0.4);
            margin-bottom: 1.5rem;
        }
        .coming-soon p {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: clamp(1rem, 2vw, 1.2rem);
            color: var(--text-secondary);
            letter-spacing: 0.3em;
            margin-bottom: 0.8rem;
        }
        .coming-soon .hint-text {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 2rem;
        }
        .back-home {
            margin-top: 3rem;
            padding: 14px 32px;
            background: transparent;
            border: 1px solid var(--gold-dim);
            border-radius: 4px;
            color: var(--gold);
            text-decoration: none;
            font-family: 'Noto Serif SC', serif;
            font-size: 1rem;
            letter-spacing: 0.3em;
            transition: all 0.3s ease;
        }
        .back-home:hover {
            background: rgba(201, 162, 39, 0.1);
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(201, 162, 39, 0.2);
        }
    </style>
</head>
<body>
    <div class="coming-soon">
        <h2>菩提宇宙</h2>
        <p>命运的序章，正在书写</p>
        <p class="hint-text">主宇宙叙事页面开发中...</p>
        <a href="index.html" class="back-home">返回首页</a>
    </div>
    <script src="js/i18n.js"></script>
</body>
</html>
