<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>灵体故事 | 存在的记忆</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        :root {
            --spirit-blue: #8eb8e5;
            --spirit-cyan: #7dd3d3;
            --spirit-glow: rgba(142, 184, 229, 0.6);
            --spirit-purple: #b8a8d4;
            --ink-black: #0d1117;
            --text-primary: #c9d6e3;
            --text-secondary: #8a9bb0;
            --accent-warm: #e8c4a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { padding-top: 70px;
            background: var(--ink-black);
            font-family: 'Noto Serif SC', serif;
            overflow-x: hidden;
            min-height: 100vh;
            cursor: none;
        }

        /* 自定义光标 */
        .cursor {
            width: 20px;
            height: 20px;
            border: 2px solid var(--spirit-blue);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.15s ease, opacity 0.3s;
            mix-blend-mode: difference;
        }

        .cursor-glow {
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, rgba(142, 184, 229, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            transition: transform 0.3s ease;
        }

        /* Canvas背景 */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* 动态背景 */
        .dynamic-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            background: linear-gradient(135deg, #0d1117 0%, #1a2030 50%, #0d1117 100%);
            background-size: 400% 400%;
            animation: bgFlow 20s ease infinite;
        }

        @keyframes bgFlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* 导航栏 */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(142, 184, 229, 0.15);
            padding: 0.8rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .nav-link {
            color: var(--text-secondary);
            font-family: 'ZCOOL XiaoWei', serif;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: 1px solid transparent;
            background: transparent;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.4s;
            border-radius: 4px;
        }

        .nav-link:hover {
            color: var(--spirit-cyan);
            border-color: rgba(125, 211, 211, 0.3);
            background: rgba(125, 211, 211, 0.08);
        }

        /* 灵体进度条 */
        .spirit-progress {
            position: fixed;
            top: 56px;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(142, 184, 229, 0.1);
            z-index: 99;
            overflow: hidden;
        }

        .spirit-progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, 
                transparent, 
                var(--spirit-blue), 
                var(--spirit-cyan), 
                transparent);
            position: relative;
            transition: width 1s ease;
        }

        .spirit-progress-fill::after {
            content: '';
            position: absolute;
            right: 0;
            top: -3px;
            width: 8px;
            height: 8px;
            background: var(--spirit-cyan);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--spirit-glow), 0 0 30px var(--spirit-glow);
            animation: progressPulse 1.5s ease infinite;
        }

        @keyframes progressPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.8); }
        }

        /* 主容器 */
        .main-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px 60px;
            position: relative;
            z-index: 1;
        }

        /* 场景包装器 */
        .scene-wrapper {
            max-width: 700px;
            width: 100%;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .scene-wrapper.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* 转场效果 */
        .scene-wrapper.transitioning {
            animation: sceneTransition 1.2s ease;
        }

        @keyframes sceneTransition {
            0% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
            40% { opacity: 0; transform: scale(0.95) translateY(-20px); filter: blur(8px); }
            60% { opacity: 0; transform: scale(1.05) translateY(20px); filter: blur(8px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        /* 灵体角色 */
        .spirit-character {
            width: 120px;
            height: 180px;
            margin: 0 auto 2rem;
            position: relative;
            animation: spiritFloat 4s ease-in-out infinite;
        }

        .spirit-figure {
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 50% 30%, 
                rgba(142, 184, 229, 0.7) 0%, 
                rgba(142, 184, 229, 0.3) 40%, 
                transparent 70%);
            border-radius: 50% 50% 45% 45%;
            animation: spiritBreath 3s ease-in-out infinite;
            position: relative;
        }

        .spirit-figure::before {
            content: '';
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 20px;
            background: radial-gradient(ellipse, 
                rgba(125, 211, 211, 0.8) 0%, 
                transparent 70%);
            border-radius: 50%;
        }

        .spirit-figure::after {
            content: '';
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 8px;
            background: var(--spirit-cyan);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--spirit-glow), 15px 0 0 var(--spirit-cyan), 15px 0 15px var(--spirit-glow);
            animation: blinkEyes 4s ease-in-out infinite;
        }

        .spirit-aura {
            position: absolute;
            top: -20px;
            left: -30px;
            right: -30px;
            bottom: -20px;
            background: radial-gradient(ellipse, 
                rgba(142, 184, 229, 0.15) 0%, 
                transparent 70%);
            border-radius: 50%;
            animation: auraPulse 2s ease-in-out infinite;
        }

        @keyframes spiritFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes spiritBreath {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.05); }
        }

        @keyframes auraPulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.15); opacity: 0.8; }
        }

        @keyframes blinkEyes {
            0%, 45%, 55%, 100% { transform: translateX(-50%) scaleY(1); }
            50% { transform: translateX(-50%) scaleY(0.1); }
        }

        /* 场景标题 */
        .scene-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 1.5rem;
            color: var(--spirit-cyan);
            text-align: center;
            margin-bottom: 2rem;
            text-shadow: 0 0 30px rgba(125, 211, 211, 0.5);
            letter-spacing: 0.3em;
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards;
            animation-delay: 0.3s;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 叙事文字容器 */
        .narrative-container {
            background: rgba(20, 28, 40, 0.7);
            border: 1px solid rgba(142, 184, 229, 0.15);
            border-radius: 16px;
            padding: 2rem 2.5rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .narrative-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--spirit-blue), transparent);
        }

        /* 打字机文字 */
        .narrative-text {
            color: var(--text-primary);
            font-size: 1.1rem;
            line-height: 2.2;
            min-height: 150px;
        }

        .narrative-text .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: var(--spirit-cyan);
            margin-left: 2px;
            animation: cursorBlink 0.8s ease infinite;
            vertical-align: text-bottom;
        }

        @keyframes cursorBlink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* 关键词高亮 */
        .highlight-word {
            color: var(--accent-warm);
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
        }

        .highlight-word::after {
            content: attr(data-hint);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: rgba(30, 40, 55, 0.95);
            border: 1px solid var(--spirit-purple);
            color: var(--spirit-purple);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .highlight-word:hover {
            color: var(--spirit-cyan);
            text-shadow: 0 0 20px var(--spirit-glow);
        }

        .highlight-word:hover::after {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* 音波动画（场景1） */
        .sound-waves {
            position: absolute;
            right: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 3px;
            align-items: center;
        }

        .sound-wave {
            width: 3px;
            background: linear-gradient(to top, var(--spirit-blue), transparent);
            border-radius: 2px;
            animation: wave 1s ease-in-out infinite;
        }

        .sound-wave:nth-child(1) { height: 12px; animation-delay: 0s; }
        .sound-wave:nth-child(2) { height: 20px; animation-delay: 0.1s; }
        .sound-wave:nth-child(3) { height: 15px; animation-delay: 0.2s; }
        .sound-wave:nth-child(4) { height: 25px; animation-delay: 0.3s; }
        .sound-wave:nth-child(5) { height: 18px; animation-delay: 0.4s; }

        @keyframes wave {
            0%, 100% { transform: scaleY(1); opacity: 0.5; }
            50% { transform: scaleY(0.4); opacity: 1; }
        }

        /* 选择按钮 */
        .choices-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards;
            animation-delay: 0.6s;
        }

        .choice-btn {
            padding: 1.2rem 1.8rem;
            background: rgba(25, 35, 50, 0.8);
            border: 1px solid rgba(142, 184, 229, 0.25);
            color: var(--text-primary);
            font-family: 'Noto Serif SC', serif;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            text-align: left;
        }

        .choice-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: radial-gradient(circle, rgba(142, 184, 229, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .choice-btn::after {
            content: '→';
            position: absolute;
            right: 1.5rem;
            top: 50%;
            transform: translateY(-50%) translateX(0);
            opacity: 0;
            transition: all 0.3s;
            color: var(--spirit-cyan);
        }

        .choice-btn:hover {
            border-color: var(--spirit-blue);
            background: rgba(142, 184, 229, 0.1);
            transform: translateX(8px);
            box-shadow: 0 0 30px rgba(142, 184, 229, 0.2);
        }

        .choice-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .choice-btn:hover::after {
            opacity: 1;
            transform: translateY(-50%) translateX(5px);
        }

        /* 场景6震动效果 */
        .scene-shake {
            animation: screenShake 0.5s ease;
        }

        @keyframes screenShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-3px) rotate(-0.5deg); }
            40% { transform: translateX(3px) rotate(0.5deg); }
            60% { transform: translateX(-2px) rotate(-0.3deg); }
            80% { transform: translateX(2px) rotate(0.3deg); }
        }

        /* 跑步者耳机线动画 */
        .runner-container {
            position: relative;
            margin: 1rem 0;
        }

        .headphone-line {
            position: absolute;
            width: 60px;
            height: 40px;
            border: 2px solid var(--spirit-blue);
            border-radius: 50%;
            border-top-color: transparent;
            opacity: 0.6;
            animation: headphoneSwing 2s ease-in-out infinite;
        }

        .headphone-line::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            width: 2px;
            height: 20px;
            background: linear-gradient(to bottom, var(--spirit-blue), transparent);
            animation: cordSwing 1.5s ease-in-out infinite;
        }

        @keyframes headphoneSwing {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        @keyframes cordSwing {
            0%, 100% { transform: translateX(-50%) rotate(-3deg); }
            50% { transform: translateX(-50%) rotate(3deg); }
        }

        /* 结尾月光效果 */
        .moonlight-effect .spirit-figure {
            background: radial-gradient(ellipse at 50% 30%, 
                rgba(255, 248, 230, 0.8) 0%, 
                rgba(142, 184, 229, 0.6) 30%, 
                rgba(142, 184, 229, 0.2) 60%, 
                transparent 80%);
            box-shadow: 0 0 60px rgba(255, 248, 230, 0.4), 0 0 100px rgba(255, 248, 230, 0.2);
            animation: moonlightFill 3s ease-in-out infinite;
        }

        @keyframes moonlightFill {
            0% { box-shadow: 0 0 40px rgba(255, 248, 230, 0.3); }
            50% { box-shadow: 0 0 80px rgba(255, 248, 230, 0.6); }
            100% { box-shadow: 0 0 40px rgba(255, 248, 230, 0.3); }
        }

        /* 章节结束 */
        .chapter-end {
            text-align: center;
            padding: 2rem;
        }

        .chapter-end h2 {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 2rem;
            color: var(--spirit-cyan);
            margin-bottom: 1.5rem;
            text-shadow: 0 0 30px rgba(125, 211, 211, 0.5);
        }

        .chapter-end .narrative-text {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        .restart-btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: rgba(125, 211, 211, 0.1);
            border: 1px solid var(--spirit-cyan);
            color: var(--spirit-cyan);
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 1.1rem;
            text-decoration: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .restart-btn:hover {
            background: rgba(125, 211, 211, 0.2);
            box-shadow: 0 0 30px rgba(125, 211, 211, 0.3);
        }

        /* 雾化效果 */
        .fog-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(13, 17, 23, 0.3) 100%);
            pointer-events: none;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .fog-overlay.active {
            animation: fogPulse 3s ease-in-out infinite;
        }

        @keyframes fogPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            body { padding-top: 70px; cursor: auto; }
            .cursor, .cursor-glow { display: none; }
            
            .top-nav { padding: 0.6rem 1rem; gap: 0.5rem; }
            .nav-link { font-size: 0.8rem; padding: 0.4rem 0.6rem; }
            
            .scene-title { font-size: 1.2rem; letter-spacing: 0.15em; }
            
            .narrative-container { padding: 1.5rem; }
            .narrative-text { font-size: 1rem; line-height: 2; }
            
            .choice-btn { padding: 1rem 1.2rem; font-size: 0.95rem; }
            
            .spirit-character { width: 100px; height: 150px; }
            
            .sound-waves { display: none; }
        }

        /* 简化动画（移动端） */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body style="padding-top:70px">
    <div class="cursor" id="cursor"></div>
    <div class="cursor-glow" id="cursorGlow"></div>
    
    <div class="dynamic-bg" id="dynamicBg"></div>
    <canvas id="particleCanvas"></canvas>
    <div class="fog-overlay" id="fogOverlay"></div>

    <nav class="top-nav">
        <a href="index.html" class="nav-link">首页</a>
        <a href="character-player.html" class="nav-link">角色</a>
    </nav>

    <div class="spirit-progress">
        <div class="spirit-progress-fill" id="progressFill"></div>
    </div>

    <main class="main-container" id="mainContainer">
        <div class="scene-wrapper" id="sceneWrapper">
            <div class="spirit-character" id="spiritCharacter">
                <div class="spirit-aura"></div>
                <div class="spirit-figure"></div>
            </div>
            <h2 class="scene-title" id="sceneTitle"></h2>
            <div class="narrative-container" id="narrativeContainer">
                <div class="narrative-text" id="narrativeText"></div>
            </div>
            <div class="choices-container" id="choicesContainer"></div>
        </div>
    </main>

    <script>
        // ========== 故事数据 ==========
        const storyData = {
            scenes: {
                'scene-1': {
                    title: '第一次意识到自己存在',
                    narrative: '我好像……一直在。不是从某个时间点开始的，更像是慢慢从水底浮上来。最先清楚的是<span class="highlight-word" data-hint="原来有声音是这种感觉">声音</span>，鸟叫，还有远处汽车压过路面的声音。然后我低头，看见了自己的手，半透明的，像隔了一层毛玻璃。我闻到了<span class="highlight-word" data-hint="原来有味道是这种感觉">丁香花的味道</span>。原来有味道是这种感觉。',
                    choices: null,
                    progress: 10,
                    bgColor: ['#0d1117', '#1a2535', '#0d1117'],
                    particleType: 'firefly',
                    showWaves: true
                },
                'scene-2': {
                    title: '有人看见了你',
                    narrative: '那是个总在长椅上喂猫的老太太。她第三次抬头时，目光直接穿过了我，然后定住了。她眯起眼睛，看了很久，轻轻说了句："哦，原来你在这儿啊。"她没害怕，就像看见一片形状特别的云。那一刻我忽然觉得，被看见……挺好的。比一个人听着风声要好。',
                    choices: null,
                    progress: 25,
                    bgColor: ['#151a24', '#1e2a3a', '#151a24'],
                    particleType: 'firefly'
                },
                'scene-3': {
                    title: '面临选择',
                    narrative: '她每天下午都来，带着猫粮和一本很厚的书。我飘在离她三米远的槐树下。<span class="highlight-word" data-hint="向前一步会怎样？">靠近，还是就这样待着？</span>靠近的话，我不知道会发生什么。但只是这样看着，心里又有点空。风吹过来，我感觉自己像一团快要散开的雾。',
                    choices: [
                        { text: '试着往长椅那边挪了一点', target: 'scene-a1' },
                        { text: '往后退，退到槐树更浓的阴影里', target: 'scene-a2' }
                    ],
                    progress: 40,
                    bgColor: ['#121a26', '#1c2a38', '#121a26'],
                    particleType: 'firefly'
                },
                'scene-a1': {
                    title: '靠近那个人',
                    narrative: '我试着往长椅那边挪了一点。很慢，像怕惊扰什么。她抬头，对我笑了笑，拍了拍身边的空位。我没坐上去，只是停在了长椅扶手旁边。她也不介意，继续低头看书，偶尔指着某一页说："这段写得真蠢。"我不知道她在对谁说话，但我觉得，她在对我说话。',
                    choices: null,
                    progress: 55,
                    bgColor: ['#141f2d', '#1e2d3d', '#141f2d'],
                    particleType: 'firefly'
                },
                'scene-a2': {
                    title: '躲开',
                    narrative: '我往后退，退到槐树更浓的阴影里。她找了一圈，目光有些疑惑，最后叹了口气，低头继续翻书。我看着她的白发在阳光下有点刺眼。躲开之后，好像更自由了，又好像丢了什么东西。猫蹭着她的裤脚，发出咕噜声。那声音离我很远。',
                    choices: null,
                    progress: 55,
                    bgColor: ['#0f1820', '#18232e', '#0f1820'],
                    particleType: 'firefly'
                },
                'scene-5': {
                    title: '能穿过一切除了孤独',
                    narrative: '我可以穿过墙壁、玻璃、雨滴，甚至穿过一只飞鸟的身体。但某个深夜，整条街只剩下路灯和我时，那种寂静穿不过去。它像水一样包裹着我，又冷又重。我这才明白，我能穿透实体，但穿不过"没有声音"和"没有目光"。',
                    choices: null,
                    progress: 68,
                    bgColor: ['#0a0f14', '#121a22', '#0a0f14'],
                    particleType: 'rain'
                },
                'scene-6': {
                    title: '第二个看见你的人',
                    narrative: '<div class="runner-container"><div class="headphone-line"></div></div>是个总在半夜跑步的年轻男人。他第一次经过我时，耳机线晃了一下，脚步没停。第二次，他减速了。第三次，他停在我面前，喘着气，盯着我看了十秒。他说："你看起来……有点难过。"我没动。他补充道："也可能是我跑累了，眼花了。"',
                    choices: [
                        { text: '试着不再飘着，让脚尖碰到地面', target: 'scene-b1' },
                        { text: '朝他摇了摇头，向上飘了一点', target: 'scene-b2' }
                    ],
                    progress: 80,
                    bgColor: ['#0c1018', '#151f2a', '#0c1018'],
                    particleType: 'lightTrail',
                    shakeEffect: true
                },
                'scene-b1': {
                    title: '变得真实',
                    narrative: '我不知道怎么变"真实"。但我试着不再飘着，让脚尖碰到地面。感觉很奇怪，像踩在棉花上，但至少，我有"脚下"了。他看着我逐渐清晰的轮廓，没跑，反而笑了："这样好多了，刚才总感觉在对空气说话。"现在我的影子，终于能落在地上了。',
                    choices: null,
                    progress: 90,
                    bgColor: ['#101824', '#1a2836', '#101824'],
                    particleType: 'lightTrail'
                },
                'scene-b2': {
                    title: '保持轻盈',
                    narrative: '我朝他摇了摇头，然后向上飘了一点，让路灯的光完全穿过我的身体。他愣了一下，然后懂了。"也行，"他说，"这样也挺酷的，像个秘密。"他没再停留，继续往前跑去。我留在半空，看着他的背影变小。<span class="highlight-word" data-hint="轻盈也有轻盈的美">轻盈有轻盈的好处</span>，至少，告别变得很容易。',
                    choices: null,
                    progress: 90,
                    bgColor: ['#0e1620', '#162232', '#0e1620'],
                    particleType: 'lightTrail'
                },
                'scene-8': {
                    title: '结局',
                    narrative: '后来我习惯了在长椅边待着，偶尔也跟着跑步的男孩穿过两条街。老太太送了我一片银杏叶，夹在她那本很蠢的书里。男孩会在路灯下对我挥挥手。我还是半透明的，还是不知道自己是什么。但好像……也没那么急着知道了。今晚月亮很好，我的身体里像盛了一点点光。',
                    choices: null,
                    progress: 100,
                    bgColor: ['#0d1520', '#182230', '#0d1520'],
                    particleType: 'mapleLeaf',
                    moonlightEffect: true
                }
            }
        };

        // ========== 全局状态 ==========
        let currentScene = 'scene-1';
        let isTyping = false;
        let particles = [];
        let animationId = null;

        // ========== DOM 元素 ==========
        const cursor = document.getElementById('cursor');
        const cursorGlow = document.getElementById('cursorGlow');
        const dynamicBg = document.getElementById('dynamicBg');
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        const progressFill = document.getElementById('progressFill');
        const sceneWrapper = document.getElementById('sceneWrapper');
        const sceneTitle = document.getElementById('sceneTitle');
        const narrativeText = document.getElementById('narrativeText');
        const narrativeContainer = document.getElementById('narrativeContainer');
        const choicesContainer = document.getElementById('choicesContainer');
        const spiritCharacter = document.getElementById('spiritCharacter');
        const fogOverlay = document.getElementById('fogOverlay');
        const mainContainer = document.getElementById('mainContainer');

        // ========== 初始化 ==========
        function init() {
            // 内容优先渲染，特效异步加载不阻塞
            renderScene('scene-1');
            // 特效延后初始化
            setTimeout(function() {
                resizeCanvas();
                window.addEventListener('resize', resizeCanvas);
                initMouseTracking();
                requestAnimationFrame(function() { animate(); });
            }, 0);
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        // ========== 鼠标跟踪 ==========
        function initMouseTracking() {
            let mouseX = 0, mouseY = 0;
            let glowX = 0, glowY = 0;

            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });

            function updateCursor() {
                cursor.style.left = mouseX - 10 + 'px';
                cursor.style.top = mouseY - 10 + 'px';

                glowX += (mouseX - glowX) * 0.1;
                glowY += (mouseY - glowY) * 0.1;
                cursorGlow.style.left = glowX - 20 + 'px';
                cursorGlow.style.top = glowY - 20 + 'px';

                requestAnimationFrame(updateCursor);
            }
            updateCursor();
        }

        // ========== Canvas 粒子系统 ==========
        class Particle {
            constructor(type) {
                this.type = type;
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = this.type === 'rain' ? Math.random() * 4 + 3 : (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.3;
                this.life = 1;
                this.decay = Math.random() * 0.005 + 0.002;
                this.angle = Math.random() * Math.PI * 2;
                this.wobble = Math.random() * 0.02;
            }

            update() {
                this.x += this.speedX + Math.sin(this.angle) * 0.5;
                this.y += this.speedY;
                this.angle += this.wobble;

                if (this.type === 'rain') {
                    this.opacity = 0.3 + Math.random() * 0.2;
                } else if (this.type === 'lightTrail') {
                    this.opacity = 0.8;
                    this.speedX = Math.random() * 3 + 2;
                } else if (this.type === 'mapleLeaf') {
                    this.speedY = Math.random() * 0.5 + 0.2;
                    this.speedX = Math.sin(this.angle) * 1.5;
                    this.rotation = this.angle;
                }

                if (this.type !== 'lightTrail') {
                    this.life -= this.decay;
                }

                if (this.y > canvas.height || this.x < 0 || this.x > canvas.width || this.life <= 0) {
                    this.reset();
                    if (this.type === 'rain') {
                        this.y = -10;
                    } else if (this.type === 'lightTrail') {
                        this.y = Math.random() * canvas.height * 0.5 + canvas.height * 0.2;
                    }
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity * (this.type === 'lightTrail' ? 1 : this.life);

                if (this.type === 'firefly') {
                    const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 3);
                    gradient.addColorStop(0, 'rgba(142, 184, 229, 0.8)');
                    gradient.addColorStop(0.5, 'rgba(125, 211, 211, 0.4)');
                    gradient.addColorStop(1, 'transparent');
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                    ctx.fill();
                } else if (this.type === 'rain') {
                    ctx.strokeStyle = 'rgba(142, 184, 229, 0.5)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x + 2, this.y + 15);
                    ctx.stroke();
                } else if (this.type === 'lightTrail') {
                    const gradient = ctx.createLinearGradient(this.x, this.y, this.x - 30, this.y);
                    gradient.addColorStop(0, 'rgba(142, 184, 229, 0.8)');
                    gradient.addColorStop(1, 'transparent');
                    ctx.strokeStyle = gradient;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x - 30, this.y);
                    ctx.stroke();
                } else if (this.type === 'mapleLeaf') {
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.rotation);
                    ctx.fillStyle = 'rgba(232, 196, 160, 0.7)';
                    ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        const angle = (i * Math.PI * 2) / 5 - Math.PI / 2;
                        const x = Math.cos(angle) * this.size;
                        const y = Math.sin(angle) * this.size;
                        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                        const innerAngle = angle + Math.PI / 5;
                        ctx.lineTo(Math.cos(innerAngle) * this.size * 0.5, Math.sin(innerAngle) * this.size * 0.5);
                    }
                    ctx.closePath();
                    ctx.fill();
                }

                ctx.restore();
            }
        }

        function updateParticles(type) {
            const targetCount = {
                'firefly': 60,
                'rain': 100,
                'lightTrail': 40,
                'mapleLeaf': 30
            };

            const count = targetCount[type] || 50;

            while (particles.length < count) {
                particles.push(new Particle(type));
            }
            while (particles.length > count) {
                particles.pop();
            }

            particles.forEach(p => {
                if (p.type !== type) {
                    Object.assign(p, new Particle(type));
                }
            });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            animationId = requestAnimationFrame(animate);
        }

        // ========== 背景颜色 ==========
        function updateBackground(colors) {
            dynamicBg.style.background = 'linear-gradient(135deg, ' + colors[0] + ' 0%, ' + colors[1] + ' 50%, ' + colors[2] + ' 100%)';
        }

        // ========== 打字机效果 ==========
        async function typeWriter(element, html, speed) {
            if (speed === undefined) speed = 20;
            isTyping = true;
            element.innerHTML = '';

            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = html;
            const fullText = tempDiv.innerHTML;

            let i = 0;
            let currentHtml = '';
            let inTag = false;
            let tagContent = '';

            return new Promise(function(resolve) {
                function type() {
                    if (i < fullText.length) {
                        var char = fullText[i];

                        if (char === '<') {
                            inTag = true;
                            tagContent = '<';
                        } else if (char === '>') {
                            inTag = false;
                            tagContent += '>';
                            currentHtml += tagContent;
                            tagContent = '';
                        } else if (inTag) {
                            tagContent += char;
                        } else {
                            currentHtml += char;
                        }

                        element.innerHTML = currentHtml + '<span class="typing-cursor"></span>';
                        i++;

                        var delay = inTag ? 0 : (char === '。' || char === '，' || char === '"' ? 60 : speed);
                        setTimeout(type, delay);
                    } else {
                        element.innerHTML = currentHtml;
                        isTyping = false;
                        resolve();
                    }
                }
                type();
            });
        }

        // ========== 渲染场景 ==========
        async function renderScene(sceneId) {
            var scene = storyData.scenes[sceneId];
            if (!scene) return;

            // 立即显示内容，不被特效阻塞
            sceneTitle.textContent = scene.title;
            narrativeContainer.style.display = 'block';
            narrativeText.textContent = '';

            // 立即显示场景
            sceneWrapper.classList.add('visible');

            // 打字机效果 - 最优先
            await typeWriter(narrativeText, scene.narrative);

            // 进度条
            progressFill.style.width = scene.progress + '%';

            // 选项
            choicesContainer.innerHTML = '';
            if (scene.choices) {
                scene.choices.forEach(function(choice) {
                    var btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    btn.textContent = choice.text;
                    btn.onclick = function() { goToScene(choice.target); };
                    choicesContainer.appendChild(btn);
                });
            } else {
                // 自动继续
                setTimeout(function() {
                    var nextScene = getNextScene(sceneId);
                    if (nextScene) goToScene(nextScene);
                }, 1500);
            }

            // 特效异步加载，不阻塞内容
            setTimeout(function() {
                // 移除特殊效果类
                var oldRunner = narrativeContainer.querySelector('.runner-container');
                if (oldRunner) oldRunner.remove();
                spiritCharacter.classList.remove('moonlight-effect');
                fogOverlay.classList.remove('active');
                mainContainer.classList.remove('scene-shake');

                // 场景特效
                updateBackground(scene.bgColor);
                updateParticles(scene.particleType || 'firefly');

                if (scene.showWaves) {
                    var waves = document.createElement('div');
                    waves.className = 'sound-waves';
                    waves.innerHTML = '<div class="sound-wave"></div>'.repeat(5);
                    narrativeContainer.appendChild(waves);
                }

                if (scene.shakeEffect) {
                    mainContainer.classList.add('scene-shake');
                }

                if (scene.moonlightEffect) {
                    spiritCharacter.classList.add('moonlight-effect');
                    fogOverlay.classList.add('active');
                }
            }, 0);

            currentScene = sceneId;
        }

        function getNextScene(currentId) {
            var sceneOrder = ['scene-1', 'scene-2', 'scene-3', 'scene-5', 'scene-6', 'scene-8'];
            var idx = sceneOrder.indexOf(currentId);
            if (idx !== -1 && idx < sceneOrder.length - 1) {
                return sceneOrder[idx + 1];
            }
            return null;
        }

        function goToScene(sceneId) {
            if (isTyping) return;
            renderScene(sceneId);
        }

        // 启动
        document.addEventListener('DOMContentLoaded', init);
    </script>
