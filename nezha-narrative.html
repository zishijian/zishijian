<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>三太子 · 莲花劫 | 藏子世间</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --fire-red: #c41e3a;
            --fire-orange: #ff6b35;
            --fire-gold: #ffd700;
            --lotus-pink: #ff69b4;
            --lotus-white: #fff5f5;
            --ember: #8b0000;
            --dark-bg: rgba(20, 10, 15, 0.98);
            --ink-black: #0a0508;
            --text-primary: #ffe4e1;
            --text-secondary: #d4a5a5;
            --spirit-blue: #6eb5ff;
            --spirit-cyan: #4ecdc4;
            --spirit-purple: #a388ee;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { padding-top: 70px;
            background: var(--ink-black);
            font-family: 'Noto Serif SC', serif;
            overflow-x: hidden;
            min-height: 100vh;
            cursor: none;
        }
        
        /* 自定义光标 */
        .cursor-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 107, 53, 0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s;
        }
        
        .cursor-dot {
            position: fixed;
            width: 8px;
            height: 8px;
            background: var(--fire-gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px var(--fire-gold);
        }
        
        /* 导航栏 */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(20, 10, 15, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 2px solid var(--fire-red);
            padding: 0.8rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            box-shadow: 0 0 30px rgba(196, 30, 58, 0.3);
        }
        
        .back-btn, .nav-link {
            color: var(--fire-gold);
            font-family: 'ZCOOL XiaoWei', serif;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: 1px solid transparent;
            background: transparent;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            border-radius: 4px;
        }
        
        .back-btn { border-color: rgba(255, 215, 0, 0.4); }
        
        .back-btn:hover, .nav-link:hover {
            color: var(--fire-orange);
            text-shadow: 0 0 15px rgba(255, 107, 53, 0.8);
            border-color: var(--fire-orange);
            background: rgba(255, 107, 53, 0.1);
        }
        
        /* 进度条 - 光流效果 */
        .progress-bar {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(196, 30, 58, 0.2);
            z-index: 99;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, 
                var(--fire-red), 
                var(--fire-gold), 
                var(--fire-orange), 
                var(--fire-red));
            background-size: 300% 100%;
            animation: lightFlow 2s linear infinite;
            transition: width 0.5s ease;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
            position: relative;
        }
        
        .progress-fill::after {
            content: '';
            position: absolute;
            right: 0;
            top: -2px;
            width: 30px;
            height: 7px;
            background: linear-gradient(90deg, transparent, white);
            opacity: 0.8;
            border-radius: 50%;
            filter: blur(2px);
        }
        
        @keyframes lightFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }
        
        /* Canvas粒子容器 */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        
        /* 动态背景 */
        .scene-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            background: linear-gradient(180deg, 
                rgba(20, 10, 15, 0.85) 0%, 
                rgba(40, 15, 20, 0.8) 50%,
                rgba(20, 10, 15, 0.85) 100%);
            animation: bgShift 20s ease-in-out infinite;
        }
        
        @keyframes bgShift {
            0%, 100% { 
                filter: hue-rotate(0deg) brightness(1);
            }
            25% { 
                filter: hue-rotate(10deg) brightness(1.05);
            }
            50% { 
                filter: hue-rotate(-5deg) brightness(0.95);
            }
            75% { 
                filter: hue-rotate(5deg) brightness(1.02);
            }
        }
        
        /* 场景容器 */
        .scene-container {
            min-height: 100vh;
            width: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 40px;
            z-index: 1;
        }
        
        /* 角色图 - 呼吸效果 */
        .character-display {
            width: 100%;
            max-width: 500px;
            margin-bottom: 2rem;
            position: relative;
            opacity: 0;
            transform: scale(0.95);
            filter: blur(10px);
            transition: opacity 0.8s ease, transform 0.8s ease, filter 0.8s ease;
        }
        
        .character-display.visible {
            opacity: 1;
            transform: scale(1);
            filter: blur(0);
            animation: breathe 4s ease-in-out infinite;
        }
        
        @keyframes breathe {
            0%, 100% { 
                transform: scale(1);
            }
            50% { 
                transform: scale(1.02);
            }
        }
        
        .character-image {
            width: 100%;
            height: auto;
            border-radius: 16px;
            box-shadow: 
                0 0 60px rgba(196, 30, 58, 0.5),
                0 0 120px rgba(255, 107, 53, 0.3),
                0 20px 60px rgba(0, 0, 0, 0.6);
            border: 3px solid var(--fire-red);
        }
        
        .character-display::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 120%;
            height: 120%;
            transform: translate(-50%, -50%);
            background: radial-gradient(ellipse at center, 
                rgba(255, 107, 53, 0.35) 0%, 
                transparent 60%);
            z-index: -1;
            animation: pulseGlow 3s ease-in-out infinite;
        }
        
        @keyframes pulseGlow {
            0%, 100% { 
                opacity: 0.5;
                transform: translate(-50%, -50%) scale(1);
            }
            50% { 
                opacity: 0.85;
                transform: translate(-50%, -50%) scale(1.15);
            }
        }
        
        /* 场景标题 */
        .scene-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 1.8rem;
            color: var(--fire-gold);
            text-align: center;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease 0.3s, transform 0.6s ease 0.3s;
        }
        
        .scene-title.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* 叙事文字 */
        .narrative-text {
            max-width: 650px;
            text-align: center;
            color: var(--text-primary);
            font-size: 1.15rem;
            line-height: 2.2;
            margin-bottom: 2.5rem;
            padding: 2rem 2.5rem;
            background: rgba(40, 15, 20, 0.7);
            border-radius: 16px;
            border: 1px solid rgba(196, 30, 58, 0.4);
            box-shadow: 0 0 40px rgba(196, 30, 58, 0.2);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease 0.5s, transform 0.6s ease 0.5s;
            position: relative;
            overflow: hidden;
        }
        
        .narrative-text::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 215, 0, 0.05), 
                transparent);
            animation: shimmer 3s infinite;
        }
        
        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        
        .narrative-text.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* 打字机光标 */
        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: var(--fire-gold);
            margin-left: 2px;
            animation: blink 0.8s infinite;
            vertical-align: text-bottom;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        
        /* 关键词高亮 */
        .keyword {
            color: var(--fire-gold);
            font-weight: 600;
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .keyword::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--fire-gold), var(--fire-orange));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }
        
        .keyword:hover::after {
            transform: scaleX(1);
        }
        
        .keyword:hover {
            color: var(--fire-orange);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        
        /* 选择区域 */
        .choices-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            max-width: 550px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease 0.7s, transform 0.6s ease 0.7s;
        }
        
        .choices-container.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* 按钮特效 - 灵体穿透光圈 */
        .choice-btn {
            padding: 1.3rem 2rem;
            background: linear-gradient(135deg, 
                rgba(196, 30, 58, 0.25), 
                rgba(255, 107, 53, 0.15));
            border: 2px solid var(--fire-red);
            color: var(--fire-gold);
            font-family: 'Noto Serif SC', serif;
            font-size: 1.08rem;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            text-align: left;
            position: relative;
            overflow: hidden;
        }
        
        .choice-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.4) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.5s, height 0.5s;
        }
        
        .choice-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 215, 0, 0.15), 
                rgba(255, 107, 53, 0.1),
                transparent);
            transition: left 0.6s;
        }
        
        .choice-btn:hover {
            background: linear-gradient(135deg, 
                rgba(196, 30, 58, 0.5), 
                rgba(255, 107, 53, 0.4));
            transform: translateX(12px);
            box-shadow: 0 0 40px rgba(255, 107, 53, 0.5);
            border-color: var(--fire-gold);
            color: var(--fire-orange);
        }
        
        .choice-btn:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .choice-btn:hover::after {
            left: 100%;
        }
        
        /* 自动继续提示 */
        .auto-continue-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 215, 0, 0.5);
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.5s;
        }
        
        .auto-continue-hint.visible {
            opacity: 1;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }
        
        /* 场景转场效果 */
        .scene-transition {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--ink-black);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        
        .scene-transition.active {
            opacity: 1;
        }
        
        .scene-transition-blur {
            filter: blur(20px);
            transform: scale(1.1);
        }
        
        /* 章节结束页面 */
        .chapter-end {
            text-align: center;
            padding: 3rem 2rem;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        
        .chapter-end.visible {
            opacity: 1;
            transform: scale(1);
        }
        
        .chapter-end h2 {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 2.5rem;
            color: var(--fire-gold);
            margin-bottom: 1.5rem;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
            animation: glow 2s ease-in-out infinite;
        }
        
        @keyframes glow {
            0%, 100% { text-shadow: 0 0 30px rgba(255, 215, 0, 0.6); }
            50% { text-shadow: 0 0 50px rgba(255, 215, 0, 0.9), 0 0 80px rgba(255, 107, 53, 0.5); }
        }
        
        .chapter-end p {
            color: var(--text-secondary);
            font-size: 1.15rem;
            line-height: 2;
            margin-bottom: 1.5rem;
        }
        
        .continue-btn {
            display: inline-block;
            padding: 1.2rem 3rem;
            background: linear-gradient(135deg, 
                rgba(196, 30, 58, 0.5), 
                rgba(255, 107, 53, 0.4));
            border: 2px solid var(--fire-gold);
            color: var(--fire-gold);
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 1.3rem;
            text-decoration: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .continue-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 215, 0, 0.2), 
                transparent);
            animation: btnShine 2s infinite;
        }
        
        @keyframes btnShine {
            0% { left: -100%; }
            50%, 100% { left: 100%; }
        }
        
        .continue-btn:hover {
            background: linear-gradient(135deg, 
                rgba(196, 30, 58, 0.7), 
                rgba(255, 107, 53, 0.6));
            transform: scale(1.08);
            box-shadow: 0 0 50px rgba(255, 107, 53, 0.6);
        }
        
        .back-link {
            display: block;
            margin-top: 2rem;
            color: rgba(255, 215, 0, 0.6);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s;
        }
        
        .back-link:hover {
            color: var(--fire-gold);
        }
        
        /* 结尾特效 - 烟花 */
        .ending-firework {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 500;
        }
        
        .firework-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            animation: fireworkExplode 1.5s ease-out forwards;
        }
        
        @keyframes fireworkExplode {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }
        
        /* 淡入淡出动画 */
        .fade-out {
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        .fade-in {
            opacity: 1;
            transition: opacity 0.5s ease;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .scene-title { font-size: 1.5rem; }
            .narrative-text { 
                font-size: 1rem; 
                padding: 1.5rem;
                margin: 0 0.5rem 2rem;
                line-height: 2;
            }
            .choice-btn { 
                font-size: 0.95rem; 
                padding: 1.1rem 1.3rem;
            }
            .top-nav { 
                padding: 0.6rem 1rem; 
                gap: 0.8rem;
                flex-wrap: wrap;
            }
            .nav-link { 
                font-size: 0.85rem; 
                padding: 0.4rem 0.7rem;
            }
            .chapter-end h2 { font-size: 2rem; }
            .character-display { max-width: 90%; }
            body { padding-top: 70px; cursor: auto; }
            .cursor-glow, .cursor-dot { display: none; }
        }
    </style>
</head>
<body style="padding-top:70px">
    <!-- 自定义光标 -->
    <div class="cursor-glow" id="cursorGlow"></div>
    <div class="cursor-dot" id="cursorDot"></div>
    
    <nav class="top-nav">
        <button class="back-btn" onclick="goBack()">← 返回</button>
        <a href="character-player.html" class="nav-link">命运主角</a>
        <a href="timeline.html" class="nav-link">大圣宇宙</a>
        <a href="index.html" class="nav-link">首页</a>
    </nav>
    
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
    
    <div class="scene-bg"></div>
    <canvas id="particleCanvas"></canvas>
    
    <div class="scene-transition" id="sceneTransition"></div>
    
    <div id="sceneContent" class="scene-container">
        <!-- 场景内容将动态加载 -->
    </div>
    
    <div class="auto-continue-hint" id="autoContinueHint">自动继续中...</div>
    
    <div class="ending-firework" id="endingFirework"></div>

    <script>
        // ==================== 全局变量 ====================
        let currentScene = 'scene-1';
        let isTyping = false;
        let autoContinueTimer = null;
        let canvas, ctx;
        let particles = [];
        let animationId;
        
        // ==================== Canvas粒子系统 ====================
        class Particle {
            constructor(type = 'fire') {
                this.type = type;
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * window.innerWidth;
                this.y = window.innerHeight + 50;
                this.size = Math.random() * 4 + 2;
                this.speedY = Math.random() * 2 + 1;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.6 + 0.2;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = (Math.random() - 0.5) * 2;
                
                if (this.type === 'fire') {
                    this.color = `hsla(${Math.random() * 30 + 10}, 100%, ${Math.random() * 30 + 50}%, ${this.opacity})`;
                } else if (this.type === 'lotus') {
                    this.color = `hsla(${Math.random() * 40 + 330}, 80%, ${Math.random() * 30 + 70}%, ${this.opacity})`;
                } else {
                    this.color = `hsla(${Math.random() * 60 + 200}, 80%, 80%, ${this.opacity})`;
                }
            }
            
            update() {
                this.y -= this.speedY;
                this.x += this.speedX;
                this.rotation += this.rotationSpeed;
                
                if (this.type === 'lotus') {
                    this.speedX = Math.sin(Date.now() * 0.002 + this.x) * 0.5;
                }
                
                if (this.y < -50) {
                    this.reset();
                }
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.globalAlpha = this.opacity;
                
                if (this.type === 'fire') {
                    ctx.beginPath();
                    const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size);
                    gradient.addColorStop(0, this.color);
                    gradient.addColorStop(1, 'transparent');
                    ctx.fillStyle = gradient;
                    ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                    ctx.fill();
                } else if (this.type === 'lotus') {
                    ctx.beginPath();
                    ctx.ellipse(0, 0, this.size, this.size * 1.5, 0, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                } else {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size * 0.5, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                }
                
                ctx.restore();
            }
        }
        
        function initCanvas() {
            canvas = document.getElementById('particleCanvas');
            ctx = canvas.getContext('2d');
            resizeCanvas();
            
            // 创建粒子
            for (let i = 0; i < 40; i++) {
                particles.push(new Particle('fire'));
            }
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle('lotus'));
            }
            for (let i = 0; i < 10; i++) {
                particles.push(new Particle('star'));
            }
            
            animateParticles();
        }
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            
            animationId = requestAnimationFrame(animateParticles);
        }
        
        // ==================== 鼠标跟随光晕 ====================
        function initCursor() {
            const glow = document.getElementById('cursorGlow');
            const dot = document.getElementById('cursorDot');
            
            document.addEventListener('mousemove', (e) => {
                glow.style.left = e.clientX + 'px';
                glow.style.top = e.clientY + 'px';
                dot.style.left = e.clientX + 'px';
                dot.style.top = e.clientY + 'px';
            });
        }
        
        // ==================== 打字机效果 ====================
        async function typeWriter(element, text, speed = 20, punctSpeed = 60) {
            isTyping = true;
            element.innerHTML = '';
            const cursor = document.createElement('span');
            cursor.className = 'typing-cursor';
            
            let i = 0;
            return new Promise(resolve => {
                function type() {
                    if (i < text.length) {
                        const char = text.charAt(i);
                        element.innerHTML = text.substring(0, i + 1);
                        element.appendChild(cursor);
                        
                        // 判断是否是标点符号
                        const isPunctuation = /[，。、！？；：""''（）【】《》…—]/.test(char);
                        i++;
                        setTimeout(type, isPunctuation ? punctSpeed : speed);
                    } else {
                        cursor.remove();
                        isTyping = false;
                        resolve();
                    }
                }
                type();
            });
        }
        
        // ==================== 场景转场 ====================
        function sceneTransition(callback) {
            const transition = document.getElementById('sceneTransition');
            transition.classList.add('active');
            
            setTimeout(() => {
                callback();
                setTimeout(() => {
                    transition.classList.remove('active');
                }, 50);
            }, 500);
        }
        
        // ==================== 进度更新 ====================
        function updateProgress(progress) {
            document.getElementById('progressFill').style.width = progress + '%';
        }
        
        // ==================== 自动继续 ====================
        function startAutoContinue(sceneId) {
            const hint = document.getElementById('autoContinueHint');
            hint.classList.add('visible');
            
            autoContinueTimer = setTimeout(() => {
                hint.classList.remove('visible');
                const choices = storyData.scenes[sceneId]?.choices;
                if (choices && choices.length === 1) {
                    goToScene(choices[0].target);
                }
            }, 1500);
        }
        
        function stopAutoContinue() {
            clearTimeout(autoContinueTimer);
            document.getElementById('autoContinueHint').classList.remove('visible');
        }
        
        // ==================== 结尾烟花特效 ====================
        function createEndingFireworks() {
            const container = document.getElementById('endingFirework');
            const colors = ['#ffd700', '#ff6b35', '#c41e3a', '#ff69b4', '#4ecdc4'];
            
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    const centerX = Math.random() * window.innerWidth;
                    const centerY = Math.random() * window.innerHeight * 0.6;
                    
                    for (let j = 0; j < 30; j++) {
                        const particle = document.createElement('div');
                        particle.className = 'firework-particle';
                        particle.style.left = centerX + 'px';
                        particle.style.top = centerY + 'px';
                        particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                        
                        const angle = (j / 30) * Math.PI * 2;
                        const distance = Math.random() * 100 + 50;
                        particle.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                        particle.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
                        
                        container.appendChild(particle);
                        
                        setTimeout(() => particle.remove(), 1500);
                    }
                }, i * 300);
            }
        }
        
        // ==================== 关键词处理 ====================
        function processKeywords(text) {
            const keywords = ['期待', '英雄', '枪', '影子', '茶馆', '月亮', '火焰', '莲花', '倒影', '风', '答案', '定义'];
            let result = text;
            keywords.forEach(kw => {
                const regex = new RegExp(kw, 'g');
                result = result.replace(regex, `<span class="keyword">${kw}</span>`);
            });
            return result;
        }

        // ==================== 渲染场景 ====================
        async function renderScene(sceneId) {
            const container = document.getElementById('sceneContent');
            const scene = storyData.scenes[sceneId];
            
            if (!scene) return;
            
            stopAutoContinue();
            
            // 检查是否是结局
            if (scene.isEnding) {
                renderEnding(scene);
                return;
            }
            
            // 转场效果
            sceneTransition(async () => {
                let html = `
                    <div class="character-display">
                        <img src="${storyData.characterImage}" alt="三太子" class="character-image">
                    </div>
                    <h2 class="scene-title">${scene.title}</h2>
                    <div class="narrative-text" id="narrativeText"></div>
                    <div class="choices-container" id="choicesContainer">
                `;
                
                scene.choices.forEach((choice, index) => {
                    html += `<button class="choice-btn" onclick="goToScene('${choice.target}')" data-index="${index}">${choice.text}</button>`;
                });
                
                html += '</div>';
                
                container.innerHTML = html;
                
                // 触发动画
                setTimeout(() => {
                    document.querySelector('.character-display')?.classList.add('visible');
                    document.querySelector('.scene-title')?.classList.add('visible');
                }, 100);
                
                setTimeout(() => {
                    document.querySelector('.narrative-text')?.classList.add('visible');
                }, 300);
                
                // 打字机效果
                const narrativeEl = document.getElementById('narrativeText');
                if (narrativeEl) {
                    const processedText = processKeywords(scene.narrative);
                    await typeWriter(narrativeEl, scene.narrative, 20, 60);
                    
                    // 打字完成后显示选项
                    setTimeout(() => {
                        const choicesContainer = document.getElementById('choicesContainer');
                        if (choicesContainer) {
                            choicesContainer.classList.add('visible');
                        }
                        
                        // 更新进度
                        updateProgress(scene.progress);
                        
                        // 记录访问
                        if (!visitedScenes.includes(sceneId)) {
                            visitedScenes.push(sceneId);
                        }
                        
                        // 自动继续（如果有唯一选项）
                        if (scene.choices.length === 1) {
                            startAutoContinue(sceneId);
                        }
                    }, 300);
                }
            });
        }
        
        // ==================== 渲染结局 ====================
        async function renderEnding(scene) {
            const container = document.getElementById('sceneContent');
            
            sceneTransition(async () => {
                let html = `
                    <div class="character-display visible">
                        <img src="${storyData.characterImage}" alt="三太子" class="character-image">
                    </div>
                    <div class="chapter-end">
                        <h2>${scene.endingTitle}</h2>
                        <div class="narrative-text" id="endingNarrative"></div>
                        <p class="continue-hint" style="color: var(--lotus-pink); margin-top: 2rem; font-size: 1.2rem;">
                            ✦ ${scene.teaser} ✦
                        </p>
                        <button class="continue-btn" onclick="restartStory()">重新开始</button>
                        <a href="character-player.html" class="back-link">← 返回角色介绍</a>
                    </div>
                `;
                
                container.innerHTML = html;
                
                document.querySelector('.chapter-end')?.classList.add('visible');
                
                // 打字机效果
                const narrativeEl = document.getElementById('endingNarrative');
                if (narrativeEl) {
                    narrativeEl.classList.add('visible');
                    await typeWriter(narrativeEl, scene.narrative, 20, 60);
                }
                
                updateProgress(scene.progress);
                
                // 结尾烟花
                setTimeout(createEndingFireworks, 1000);
            });
        }
        
        // ==================== 导航函数 ====================
        function goToScene(sceneId) {
            currentScene = sceneId;
            renderScene(sceneId);
        }
        
        function goBack() {
            window.location.href = 'character-player.html';
        }
        
        function restartStory() {
            visitedScenes = [];
            goToScene('scene-1');
        }
        
        let visitedScenes = [];
        
        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', function() {
            // 优先渲染内容
            renderScene('scene-1');
            
            // 异步初始化特效
            setTimeout(() => {
                initCanvas();
                initCursor();
            }, 0);
            
            // 监听窗口大小变化
            window.addEventListener('resize', resizeCanvas);
        });
