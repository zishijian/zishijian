<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天道巡者 - MiMo</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a1628;
            --bg-mid: #12233d;
            --accent-gold: #d4a853;
            --accent-glow: #f5d799;
            --text-primary: #e8e4dc;
            --text-secondary: #9ca3af;
            --membrane: rgba(212, 168, 83, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            cursor: none;
        }

        /* Custom Cursor */
        .cursor-glow {
            position: fixed;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 168, 83, 0.4) 0%, transparent 70%);
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease;
        }

        /* Background */
        .bg-gradient {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, var(--bg-deep) 0%, var(--bg-mid) 50%, #1a2f4d 100%);
            z-index: -2;
        }

        .bg-gradient::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 30% 20%, rgba(212, 168, 83, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(212, 168, 83, 0.05) 0%, transparent 50%);
            animation: bgPulse 8s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* Canvas Particle Layer */
        #particleCanvas {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
        }

        /* Main Container */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 30px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Avatar Section */
        .avatar-section {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 50px;
            opacity: 0;
            transform: translateY(20px);
        }

        .avatar-container {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #2a3f5f 0%, #1a2a40 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            border: 2px solid rgba(212, 168, 83, 0.3);
            position: relative;
            overflow: hidden;
        }

        .avatar-pulse {
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            border: 2px solid var(--accent-gold);
            opacity: 0;
            animation: avatarPulse 3s ease-out infinite;
        }

        .avatar-pulse:nth-child(2) { animation-delay: 1s; }
        .avatar-pulse:nth-child(3) { animation-delay: 2s; }

        @keyframes avatarPulse {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .avatar-glow {
            position: absolute;
            inset: -20px;
            background: radial-gradient(circle, rgba(212, 168, 83, 0.2) 0%, transparent 70%);
            animation: glowPulse 4s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        .avatar-info h1 {
            font-size: 28px;
            font-weight: 600;
            color: var(--accent-glow);
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .avatar-info p {
            font-size: 14px;
            color: var(--text-secondary);
            font-family: 'Space Mono', monospace;
        }

        /* Story Content */
        .story-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .scene {
            background: linear-gradient(135deg, rgba(18, 35, 61, 0.8) 0%, rgba(10, 22, 40, 0.9) 100%);
            border: 1px solid rgba(212, 168, 83, 0.2);
            border-radius: 16px;
            padding: 30px 35px;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateX(-30px);
            transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .scene.visible {
            opacity: 1;
            transform: translateX(0);
        }

        .scene::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, var(--accent-gold) 0%, transparent 100%);
            opacity: 0.6;
        }

        .scene::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(212, 168, 83, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .scene-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .scene-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(212, 168, 83, 0.2) 0%, rgba(212, 168, 83, 0.05) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .scene-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--accent-gold);
            font-family: 'Space Mono', monospace;
        }

        .scene-text {
            font-size: 17px;
            line-height: 2;
            color: var(--text-primary);
            letter-spacing: 0.5px;
        }

        .scene-text .highlight {
            color: var(--accent-glow);
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .scene-text .highlight:hover {
            text-shadow: 0 0 20px rgba(212, 168, 83, 0.8);
        }

        .scene-text .highlight::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 1px;
            background: var(--accent-gold);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .scene-text .highlight:hover::after {
            transform: scaleX(1);
        }

        /* Branch Buttons */
        .branch-container {
            display: flex;
            gap: 20px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .branch-btn {
            flex: 1;
            min-width: 200px;
            padding: 18px 25px;
            background: linear-gradient(135deg, rgba(212, 168, 83, 0.1) 0%, rgba(212, 168, 83, 0.05) 100%);
            border: 1px solid rgba(212, 168, 83, 0.3);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'Noto Serif SC', serif;
            font-size: 15px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .branch-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: radial-gradient(circle, rgba(212, 168, 83, 0.3) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            transition: all 0.5s ease;
        }

        .branch-btn:hover {
            border-color: var(--accent-gold);
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(212, 168, 83, 0.2);
        }

        .branch-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .branch-btn .btn-text {
            position: relative;
            z-index: 1;
        }

        .branch-btn .btn-glow {
            position: absolute;
            inset: 0;
            border-radius: 12px;
            border: 2px solid transparent;
            background: linear-gradient(135deg, var(--accent-gold), transparent) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .branch-btn:hover .btn-glow {
            opacity: 1;
            animation: btnRing 1.5s ease-out infinite;
        }

        @keyframes btnRing {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.05); opacity: 0; }
        }

        /* Continue Button */
        .continue-btn {
            display: none;
            margin: 30px auto 0;
            padding: 16px 50px;
            background: transparent;
            border: 2px solid var(--accent-gold);
            border-radius: 30px;
            color: var(--accent-gold);
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .continue-btn.visible {
            display: block;
            animation: fadeInUp 0.6s ease;
        }

        .continue-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 168, 83, 0.3), transparent);
            animation: btnShine 2s infinite;
        }

        @keyframes btnShine {
            0% { left: -100%; }
            50%, 100% { left: 100%; }
        }

        .continue-btn:hover {
            background: var(--accent-gold);
            color: var(--bg-deep);
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(212, 168, 83, 0.5);
        }

        /* Progress Bar */
        .progress-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(212, 168, 83, 0.1);
            z-index: 100;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-glow), var(--accent-gold));
            background-size: 200% 100%;
            animation: progressFlow 2s linear infinite;
            width: 0%;
            transition: width 0.5s ease;
        }

        @keyframes progressFlow {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Scene Transition */
        .scene-transition {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1000;
        }

        .membrane-waves {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }

        .membrane-wave {
            position: absolute;
            border-radius: 50%;
            border: 2px solid var(--accent-gold);
            opacity: 0;
        }

        /* Ending Effect */
        .ending-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(10, 22, 40, 0.95) 70%);
            z-index: 500;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
        }

        .ending-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .ending-stars {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }

        .ending-star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent-glow);
            border-radius: 50%;
            animation: starFlow 3s ease-out forwards;
        }

        @keyframes starFlow {
            0% { transform: translateY(0) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(1); opacity: 0; }
        }

        /* Utility */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden { display: none !important; }

        /* Responsive */
        @media (max-width: 768px) {
            .container { padding: 30px 20px; }
            .avatar-section { flex-direction: column; text-align: center; }
            .scene { padding: 25px 20px; }
            .scene-text { font-size: 16px; }
            .branch-container { flex-direction: column; }
        }

        /* Typing cursor */
        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: var(--accent-gold);
            margin-left: 2px;
            animation: blink 0.8s infinite;
            vertical-align: text-bottom;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="cursor-glow" id="cursorGlow"></div>
    <div class="bg-gradient"></div>
    <canvas id="particleCanvas"></canvas>

    <div class="container">
        <div class="avatar-section" id="avatarSection">
            <div class="avatar-container">
                <div class="avatar-glow"></div>
                <div class="avatar">
                    <span>☉</span>
                    <div class="avatar-pulse"></div>
                    <div class="avatar-pulse"></div>
                    <div class="avatar-pulse"></div>
                </div>
            </div>
            <div class="avatar-info">
                <h1>天道巡者</h1>
                <p>THE HEAVEN'S WARDEN</p>
            </div>
        </div>

        <div class="story-section" id="storySection">
            <!-- Scenes will be dynamically inserted here -->
        </div>
    </div>

    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="scene-transition" id="sceneTransition">
        <div class="membrane-waves" id="membraneWaves"></div>
    </div>

    <div class="ending-overlay" id="endingOverlay">
        <div class="ending-stars" id="endingStars"></div>
    </div>

    <script>
        // ==================== Story Data ====================
        const storyData = [
            {
                id: 'scene1',
                icon: '🌌',
                title: '穿过了第几个宇宙',
                text: '又穿过一层膜。第几个了？早就不记数了。<span class="highlight">量子泡沫</span>擦过手背的感觉，像穿过温凉的瀑布。这个宇宙的重力常数小数点后第三位有点意思，比上一个调皮。',
                isScene: true
            },
            {
                id: 'scene2',
                icon: '💫',
                title: '又一个宇宙崩坏',
                text: '远处的星系团开始坍缩，不是引力那种，是更根本的——逻辑在打结。像看一栋老房子从梁柱开始酥掉，灰尘和记忆一起往下掉。叹了口气，调转方向。',
                isScene: true
            },
            {
                id: 'scene3',
                icon: '⚡',
                title: '两个宇宙同时求救',
                text: '腕上的界标同时震了两下。两个坐标，两处崩坏。<span class="highlight">左边</span>那个熵增失控，正在吞没文明；<span class="highlight">右边</span>那个基础法则开始错乱，生态系统撑不过三小时。只能去一个。',
                isScene: true,
                hasBranches: true,
                branches: [
                    { id: 'a1', text: '去更严重的', choice: 'A1' },
                    { id: 'a2', text: '去更脆弱的', choice: 'A2' }
                ]
            },
            {
                id: 'a1_result',
                icon: '🎯',
                title: '去更严重的',
                text: '选左边。熵增失控是癌症，错乱法则至少还能抢救。临走前给右边那个撒了把<span class="highlight">时间缓释种子</span>，能多撑半天——但愿够用。',
                isScene: true,
                condition: 'a1'
            },
            {
                id: 'a2_result',
                icon: '🛡️',
                title: '去更脆弱的',
                text: '去右边。基础法则错乱像地基塌了，上面再繁华也得完。左边那个体量大，还能多烧一会儿。在崩坏的星云边缘留了道<span class="highlight">警戒光幕</span>，刺眼，但能拖延点时间。',
                isScene: true,
                condition: 'a2'
            },
            {
                id: 'scene5',
                icon: '🔍',
                title: '崩坏的根源',
                text: '根源找到了。不是外敌，不是天灾。是这个宇宙自己产生了"否定倾向"——太多文明在问"存在有什么意义"，问到连<span class="highlight">物理定律</span>都开始犹豫。真是的，<span class="highlight">哲学问题</span>把现实问垮了。',
                isScene: true
            },
            {
                id: 'scene6',
                icon: '💭',
                title: '有人问你为什么还不累',
                text: '在修补法则间隙时，一个刚学会跨星系通讯的文明发来信号。不是求救，是问："您穿梭这么多世界，见证这么多崩塌，<span class="highlight">不会累吗？</span>"',
                isScene: true,
                hasBranches: true,
                branches: [
                    { id: 'b1', text: '说实话', choice: 'B1' },
                    { id: 'b2', text: '笑着说', choice: 'B2' }
                ]
            },
            {
                id: 'b1_result',
                icon: '🌟',
                title: '说实话',
                text: '"累。"我对着信号源说，"但见过烟花炸开前那根引线吗？我就是点火的人，也是看烟花的人。总得有人看着，万一哪个宇宙炸出朵<span class="highlight">特别好看的</span>呢。"',
                isScene: true,
                condition: 'b1'
            },
            {
                id: 'b2_result',
                icon: '😊',
                title: '笑着说',
                text: '"累啊，"我笑出声，"但就像你明知道熬夜伤身，还是会为一场好电影撑到片尾曲。宇宙们就是我的<span class="highlight">烂片马拉松</span>——偶尔也有彩蛋。"',
                isScene: true,
                condition: 'b2'
            },
            {
                id: 'ending',
                icon: '✨',
                title: '结局',
                text: '修补完成。法则重新绷紧，像拉好的琴弦。那个问问题的文明发来一段频率，是他们的音乐——用<span class="highlight">重力波谱</span>的曲子。挺好听。星光重新开始正常流淌，我拍了拍这个宇宙的"边缘"，像告别一个老朋友。腕上又震了。下个坐标见。',
                isScene: true,
                isEnding: true
            }
        ];

        // ==================== Global State ====================
        let currentSceneIndex = 0;
        let userChoices = { scene3: null, scene6: null };
        let isTyping = false;
        let typeTimeout = null;

        // ==================== DOM Elements ====================
        const storySection = document.getElementById('storySection');
        const progressBar = document.getElementById('progressBar');
        const cursorGlow = document.getElementById('cursorGlow');
        const sceneTransition = document.getElementById('sceneTransition');
        const membraneWaves = document.getElementById('membraneWaves');
        const endingOverlay = document.getElementById('endingOverlay');
        const endingStars = document.getElementById('endingStars');
        const avatarSection = document.getElementById('avatarSection');

        // ==================== Custom Cursor ====================
        document.addEventListener('mousemove', (e) => {
            cursorGlow.style.left = e.clientX + 'px';
            cursorGlow.style.top = e.clientY + 'px';
        });

        // ==================== Particle System ====================
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animationId;

        class Particle {
            constructor(type = 'stardust') {
                this.type = type;
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.2;
                this.life = Math.random() * 200 + 100;
                this.maxLife = this.life;

                if (this.type === 'quantum') {
                    this.size = Math.random() * 3 + 1;
                    this.color = `hsla(${40 + Math.random() * 20}, 70%, ${60 + Math.random() * 20}%, `;
                    this.wobble = Math.random() * Math.PI * 2;
                } else if (this.type === 'gravity') {
                    this.angle = Math.random() * Math.PI * 2;
                    this.radius = Math.random() * 50 + 20;
                    this.centerX = canvas.width / 2;
                    this.centerY = canvas.height / 2;
                }
            }

            update() {
                this.life--;

                if (this.life <= 0) {
                    this.reset();
                    return;
                }

                if (this.type === 'stardust') {
                    this.x += this.speedX;
                    this.y += this.speedY;

                    if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                    if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
                } else if (this.type === 'quantum') {
                    this.wobble += 0.05;
                    this.x += Math.sin(this.wobble) * 0.5;
                    this.y += Math.cos(this.wobble) * 0.5;
                } else if (this.type === 'gravity') {
                    this.angle += 0.01;
                    this.x = this.centerX + Math.cos(this.angle) * this.radius;
                    this.y = this.centerY + Math.sin(this.angle) * this.radius;
                }
            }

            draw() {
                const lifeRatio = this.life / this.maxLife;
                const alpha = this.opacity * lifeRatio;

                if (this.type === 'quantum') {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * (1 + (1 - lifeRatio) * 0.5), 0, Math.PI * 2);
                    ctx.fillStyle = this.color + alpha + ')';
                    ctx.fill();

                    // Glow effect
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                    ctx.fillStyle = this.color + alpha * 0.3 + ')';
                    ctx.fill();
                } else if (this.type === 'gravity') {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 0.5, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(212, 168, 83, ${alpha * 0.5})`;
                    ctx.fill();
                } else {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(232, 228, 220, ${alpha})`;
                    ctx.fill();
                }
            }
        }

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            particles = [];
            // Create different particle types
            for (let i = 0; i < 60; i++) particles.push(new Particle('stardust'));
            for (let i = 0; i < 20; i++) particles.push(new Particle('quantum'));
            for (let i = 0; i < 15; i++) particles.push(new Particle('gravity'));
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            animationId = requestAnimationFrame(animateParticles);
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles.forEach(p => {
                p.centerX = canvas.width / 2;
                p.centerY = canvas.height / 2;
            });
        }

        // ==================== Typewriter Effect ====================
        async function typeWriter(element, html, speed = 20, punctSpeed = 60) {
            isTyping = true;
            element.innerHTML = '';

            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = html;
            const plainText = tempDiv.textContent;

            let i = 0;
            const cursor = document.createElement('span');
            cursor.className = 'typing-cursor';
            element.appendChild(cursor);

            return new Promise((resolve) => {
                function type() {
                    if (i < plainText.length) {
                        const char = plainText[i];
                        cursor.remove();

                        // Check if we're at a highlight span in original HTML
                        const highlightMatch = html.substring(0, html.indexOf(plainText.substring(0, i + 1).replace(/[.*+?^${}()|[\]\\]/g, '\\$&'))).match(/<span class="highlight">/g);
                        const closeMatch = html.substring(0, html.indexOf(plainText.substring(0, i + 1).replace(/[.*+?^${}()|[\]\\]/g, '\\$&'))).match(/<\/span>/g);

                        // Simple approach: just append characters
                        const currentText = plainText.substring(0, i + 1);
                        element.innerHTML = reconstructHTML(html, currentText);
                        element.appendChild(cursor);

                        i++;

                        // Check for punctuation
                        const delay = /[，。！？、；：""''（）【】《》]/.test(char) ? punctSpeed : speed;
                        typeTimeout = setTimeout(type, delay);
                    } else {
                        cursor.remove();
                        element.innerHTML = html;
                        isTyping = false;
                        resolve();
                    }
                }

                type();
            });
        }

        function reconstructHTML(html, visibleText) {
            let result = '';
            let textCount = 0;
            let inTag = false;
            let inHighlight = false;
            let tagBuffer = '';

            for (let i = 0; i < html.length && textCount < visibleText.length; i++) {
                if (html[i] === '<') {
                    inTag = true;
                    tagBuffer = '<';
                } else if (html[i] === '>') {
                    inTag = false;
                    tagBuffer += '>';
                    if (tagBuffer.includes('class="highlight"')) inHighlight = true;
                    if (tagBuffer === '</span>') inHighlight = false;
                    result += tagBuffer;
                    tagBuffer = '';
                } else if (inTag) {
                    tagBuffer += html[i];
                } else {
                    result += html[i];
                    textCount++;
                }
            }

            // Close any open highlight tags
            if (inHighlight) result += '</span>';

            return result;
        }

        // ==================== Scene Rendering ====================
        function createSceneElement(scene) {
            const div = document.createElement('div');
            div.className = 'scene';
            div.id = scene.id;

            div.innerHTML = `
                <div class="scene-header">
                    <div class="scene-icon">${scene.icon}</div>
                    <div class="scene-title">${scene.title}</div>
                </div>
                <div class="scene-text" id="text-${scene.id}"></div>
                ${scene.hasBranches ? `
                    <div class="branch-container" id="branches-${scene.id}">
                        ${scene.branches.map(b => `
                            <button class="branch-btn" data-choice="${b.id}" data-next="${scene.id}_${b.id}">
                                <div class="btn-glow"></div>
                                <span class="btn-text">${b.text}</span>
                            </button>
                        `).join('')}
                    </div>
                ` : ''}
                <button class="continue-btn" id="continue-${scene.id}">继续 →</button>
            `;

            return div;
        }

        async function renderScene(index) {
            if (index >= storyData.length) {
                triggerEnding();
                return;
            }

            const scene = storyData[index];

            // Check conditions for branch results
            if (scene.condition) {
                if (scene.condition === 'a1' && userChoices.scene3 !== 'a1') return;
                if (scene.condition === 'a2' && userChoices.scene3 !== 'a2') return;
                if (scene.condition === 'b1' && userChoices.scene6 !== 'b1') return;
                if (scene.condition === 'b2' && userChoices.scene6 !== 'b2') return;
            }

            // Trigger membrane transition
            await triggerMembraneTransition();

            const sceneEl = createSceneElement(scene);
            storySection.appendChild(sceneEl);

            // Update progress
            const progress = ((index + 1) / getFilteredStoryLength()) * 100;
            progressBar.style.width = progress + '%';

            // Show scene with animation
            setTimeout(() => {
                sceneEl.classList.add('visible');
            }, 100);

            // Type the text
            const textEl = document.getElementById(`text-${scene.id}`);
            await typeWriter(textEl, scene.text);

            // Show continue button or branches
            if (scene.hasBranches) {
                const branchesContainer = document.getElementById(`branches-${scene.id}`);
                if (branchesContainer) {
                    branchesContainer.style.opacity = '0';
                    setTimeout(() => {
                        branchesContainer.style.opacity = '1';
                        branchesContainer.style.transition = 'opacity 0.5s ease';
                    }, 300);
                }
            } else if (!scene.isEnding) {
                const continueBtn = document.getElementById(`continue-${scene.id}`);
                if (continueBtn) {
                    setTimeout(() => {
                        continueBtn.classList.add('visible');
                    }, 300);
                }
            }

            currentSceneIndex = index;
            updateURL();
        }

        function getFilteredStoryLength() {
            let count = 0;
            for (const scene of storyData) {
                if (scene.condition) {
                    if (scene.condition === 'a1' || scene.condition === 'a2') {
                        if (userChoices.scene3 === scene.condition) count++;
                    } else if (scene.condition === 'b1' || scene.condition === 'b2') {
                        if (userChoices.scene6 === scene.condition) count++;
                    }
                } else {
                    count++;
                }
            }
            return count;
        }

        // ==================== Membrane Transition ====================
        function triggerMembraneTransition() {
            return new Promise((resolve) => {
                const wave = document.createElement('div');
                wave.className = 'membrane-wave';
                membraneWaves.appendChild(wave);

                const rect = membraneWaves.getBoundingClientRect();
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const maxRadius = Math.max(rect.width, rect.height);

                wave.style.left = centerX + 'px';
                wave.style.top = centerY + 'px';
                wave.style.width = '0px';
                wave.style.height = '0px';
                wave.style.marginLeft = '0px';
                wave.style.marginTop = '0px';

                wave.animate([
                    {
                        width: '0px',
                        height: '0px',
                        marginLeft: '0px',
                        marginTop: '0px',
                        opacity: 0.8,
                        borderWidth: '3px'
                    },
                    {
                        width: maxRadius * 2 + 'px',
                        height: maxRadius * 2 + 'px',
                        marginLeft: -maxRadius + 'px',
                        marginTop: -maxRadius + 'px',
                        opacity: 0,
                        borderWidth: '1px'
                    }
                ], {
                    duration: 800,
                    easing: 'cubic-bezier(0.4, 0, 0.2, 1)'
                }).onfinish = () => {
                    wave.remove();
                    resolve();
                };
            });
        }

        // ==================== Ending Effect ====================
        function triggerEnding() {
            endingOverlay.classList.add('active');

            // Create stars
            setTimeout(() => {
                for (let i = 0; i < 100; i++) {
                    setTimeout(() => {
                        const star = document.createElement('div');
                        star.className = 'ending-star';
                        star.style.left = Math.random() * 100 + '%';
                        star.style.bottom = '0';
                        star.style.animationDelay = Math.random() * 2 + 's';
                        star.style.animationDuration = (2 + Math.random() * 2) + 's';
                        endingStars.appendChild(star);

                        setTimeout(() => star.remove(), 4000);
                    }, i * 50);
                }
            }, 500);

            // Fade out overlay after stars
            setTimeout(() => {
                endingOverlay.style.opacity = '0';
            }, 5000);
        }

        // ==================== Event Handlers ====================
        document.addEventListener('click', async (e) => {
            if (isTyping) {
                clearTimeout(typeTimeout);
                const currentScene = storyData[currentSceneIndex];
                const textEl = document.getElementById(`text-${currentScene.id}`);
                if (textEl) {
                    textEl.innerHTML = currentScene.text;
                    isTyping = false;
                }
                return;
            }

            // Branch button
            if (e.target.closest('.branch-btn')) {
                const btn = e.target.closest('.branch-btn');
                const choiceId = btn.dataset.choice;
                const sceneId = btn.closest('.scene').id;

                if (sceneId === 'scene3') userChoices.scene3 = choiceId;
                if (sceneId === 'scene6') userChoices.scene6 = choiceId;

                // Hide all buttons
                document.querySelectorAll('.branch-btn').forEach(b => {
                    b.style.pointerEvents = 'none';
                    b.style.opacity = '0.3';
                });
                btn.style.opacity = '1';
                btn.style.borderColor = 'var(--accent-gold)';
                btn.style.boxShadow = '0 0 20px rgba(212, 168, 83, 0.3)';

                // Hide branch container
                const branchesContainer = document.getElementById(`branches-${sceneId}`);
                if (branchesContainer) {
                    branchesContainer.style.opacity = '0';
                }

                // Continue after choice
                setTimeout(() => {
                    renderScene(currentSceneIndex + 1);
                }, 1500);
            }

            // Continue button
            if (e.target.closest('.continue-btn')) {
                const continueBtn = e.target.closest('.continue-btn');
                continueBtn.style.display = 'none';
                renderScene(currentSceneIndex + 1);
            }
        });

        // ==================== URL State ====================
        function updateURL() {
            const state = {
                index: currentSceneIndex,
                choices: userChoices
            };
            history.replaceState(state, '', '#' + btoa(JSON.stringify(state)));
        }

        function loadFromURL() {
            const hash = window.location.hash.substring(1);
            if (hash) {
                try {
                    const state = JSON.parse(atob(hash));
                    currentSceneIndex = state.index || 0;
                    userChoices = state.choices || { scene3: null, scene6: null };
                } catch (e) {
                    console.log('Invalid state in URL');
                }
            }
        }

        // ==================== Initialization ====================
        function init() {
            // Show avatar
            setTimeout(() => {
                avatarSection.style.opacity = '1';
                avatarSection.style.transform = 'translateY(0)';
                avatarSection.style.transition = 'all 0.8s ease';
            }, 300);

            // Initialize canvas and particles
            initCanvas();
            animateParticles();

            // Load state from URL if present
            loadFromURL();

            // Render first scene after delay
            setTimeout(() => {
                renderScene(0);
            }, 1000);

            // Handle resize
            window.addEventListener('resize', resizeCanvas);

            // Keyboard navigation
            document.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.key === 'Enter') {
                    if (!isTyping) {
                        const continueBtn = document.querySelector('.continue-btn.visible');
                        if (continueBtn) {
                            continueBtn.click();
                        }
                    }
                }
            });
        }

        // Start when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
