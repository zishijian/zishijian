<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>藏子世间 - 诸天宇宙</title>
    <link rel="stylesheet" href="css/style.css?v=1777460000">
    <!-- 预加载字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body style="padding-top:70px">
    <!-- 首页封面 -->
    <section id="cover" class="full-screen">
        <div class="cover-image"></div>
        <div class="overlay"></div>
        
        <!-- 标题区域 -->
        <div class="title-container">
            <h1 class="main-title">
                <span class="title-char">藏</span><span class="title-char">子</span><span class="title-char">世</span><span class="title-char">间</span>
            </h1>
            <p class="subtitle">诸天宇宙，由你书写</p>
        </div>
        
        <!-- 宇宙介绍 -->
        <div class="universe-intro">
            <p>三千世界，虚实交织</p>
            <p>命运之线，已在指尖</p>
        </div>
        
        <!-- 核心CTA按钮 -->
        <div class="cta-container">
            <a href="story-puti.html" class="explore-btn">
                <span class="btn-glow"></span>
                <span class="btn-text">开始探索</span>
                <span class="btn-arrow">›</span>
            </a>
            <p class="cta-hint">踏入藏子世间，书写你的命运</p>
            <a href="#wukong-universe" class="wukong-entry" onclick="document.getElementById('wukong-universe').classList.remove('hidden'); return false;">
                <span>📖</span> 进入大圣宇宙
            </a>
        </div>
        
        <!-- 导航入口 - 黑神话风格 -->
        <nav class="home-nav">
            <a href="character-player.html" class="nav-item" data-page="player">
                <span class="nav-icon"></span>
                <span class="nav-text" data-i18n="fatedProtagonist">命运主角</span>
            </a>
            <a href="timeline.html" class="nav-item" data-page="timeline">
                <span class="nav-icon"></span>
                <span class="nav-text" data-i18n="greatSageUniverse">大圣宇宙</span>
            </a>
            <a href="enhanced-creator.html" class="nav-item highlight" data-page="creator">
                <span class="nav-icon"></span>
                <span class="nav-text" data-i18n="createUniverse">创造独立宇宙</span>
            </a>
            <a href="jiyuan.html" class="nav-item secret-easter-egg" data-page="jiyuan">
                <span class="nav-icon"></span>
                <span class="nav-text" data-i18n="serendipity">机缘</span>
            </a>
            <a href="agents.html" class="nav-item" data-page="observatory">
                <span class="nav-icon"></span>
                <span class="nav-text">观测站</span>
            </a>
            <a href="http://soul.ticalasi.com" target="_blank" class="nav-item soulagent-link" data-page="soulagent">
                <span class="nav-icon"></span>
                <span class="nav-text" data-i18n="soulagent">soul</span>
            </a>
        </nav>
        
        <!-- 番茄小说入口 -->
        <div class="fanqie-entrance">
            <a href="https://changdunovel.com/t/rZqNw3D2iiw/" target="_blank" class="fanqie-btn">
                <span class="fanqie-icon"></span>
                <span class="fanqie-text">去番茄读完整小说</span>
            </a>
        </div>
    </section>

    <!-- 大圣宇宙页面 -->
    <section id="wukong-universe" class="universe-page hidden" style="background: linear-gradient(rgba(10, 9, 8, 0.6), rgba(10, 9, 8, 0.7)), url('images/wukong_bg.jpg') center center / cover no-repeat;">
        <div class="content-container">
            <div class="chapter-preview" style="background: linear-gradient(rgba(10, 9, 8, 0.5), rgba(10, 9, 8, 0.6)), url('images/wudao_bg.jpg') center/cover no-repeat;">
                <h3>序章</h3>
                <div class="chapter-content">
                    <p>方寸山，斜月三星洞。</p>
                    <p>你睁开眼，发现自己盘坐在石阶之上，面前是漫天仙佛。</p>
                    <p>一个熟悉的背影挡在你身前——那是孙悟空，但他没有回头。</p>
                    <p>他只是望着前方高台，轻声说了一句：</p>
                    <p class="quote">"师弟，你终于来了。"</p>
                </div>
            </div>
            
            <!-- 番茄小说阅读按钮 -->
            <a href="https://changdunovel.com/t/rZqNw3D2iiw/" target="_blank" class="fanqie-link">
                去番茄读完整小说 →
            </a>
        </div>
    </section>

    <!-- 穿门转场视频覆盖层 -->
    <div id="portal-overlay" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:99999; background:#000;">
        <video id="portal-video" src="videos/portal-transition.mp4" style="width:100vw; height:100vh; object-fit:cover;" muted playsinline></video>
    </div>

    <script>
    // 导航穿门转场
    document.addEventListener('click', function(e) {
        const navItem = e.target.closest('.nav-item[data-page="creator"], .explore-btn[href*="enhanced-creator"]');
        if (navItem && navItem.href && !navItem.href.startsWith('#')) {
            e.preventDefault();
            const targetUrl = navItem.href;
            const overlay = document.getElementById('portal-overlay');
            const video = document.getElementById('portal-video');
            overlay.style.display = 'block';
            video.currentTime = 0;
            video.play();
            video.onended = function() {
                window.location.href = targetUrl;
            };
        }
    });
    </script>

    <script src="js/main.js"></script>
<script src="js/i18n.js"></script>
</body>
</html>
