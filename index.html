<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>藏子世间 | Zishijian</title>
  <style>
    :root {
      --deep-void: #050508;
      --void-2: #0a0a12;
      --accent-green: #39ff14;
      --accent-cyan: #00d4ff;
      --accent-purple: #9b59b6;
      --gold: #d4a853;
      --text-primary: #e0e0e0;
      --text-secondary: #888;
      --glow-green: rgba(57, 255, 20, 0.15);
      --glow-cyan: rgba(0, 212, 255, 0.1);
      --border-dim: rgba(255, 255, 255, 0.06);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100vh;
      background: var(--deep-void);
      font-family: 'Courier New', 'Microsoft YaHei', monospace;
      color: var(--text-primary);
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
    }

    /* BG grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border-dim) 1px, transparent 1px),
        linear-gradient(90deg, var(--border-dim) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
      pointer-events: none;
    }

    /* Ambient glow */
    .glow-top {
      position: fixed;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--glow-green) 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
      animation: pulse 8s ease-in-out infinite;
    }
    .glow-bottom {
      position: fixed;
      bottom: -30%;
      right: -10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, var(--glow-cyan) 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
      animation: pulse 12s ease-in-out infinite reverse;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: translateX(-50%) scale(1); }
      50% { opacity: 0.8; transform: translateX(-50%) scale(1.15); }
    }

    .content {
      position: relative;
      z-index: 1;
      max-width: 720px;
      width: 100%;
      text-align: center;
    }

    /* Typing cursor */
    .terminal-line {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 1rem;
      opacity: 0.7;
      letter-spacing: 0.05em;
    }
    .terminal-line .cursor {
      display: inline-block;
      width: 8px;
      height: 1em;
      background: var(--accent-green);
      margin-left: 4px;
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }

    /* Title */
    .title {
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      margin: 1.5rem 0 0.5rem;
      background: linear-gradient(135deg, var(--accent-green), var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      position: relative;
    }
    .title-sub {
      font-size: 1.1rem;
      color: var(--text-secondary);
      letter-spacing: 0.3em;
      margin-bottom: 2.5rem;
      font-weight: 300;
    }
    .title-sub span {
      color: var(--accent-green);
    }

    /* Divider */
    .divider {
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-green), transparent);
      margin: 1rem auto 2.5rem;
      opacity: 0.6;
    }

    /* Description */
    .desc {
      font-size: 0.95rem;
      line-height: 1.8;
      color: var(--text-secondary);
      max-width: 520px;
      margin: 0 auto 3rem;
    }

    /* Cards */
    .card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
      margin-bottom: 3rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-dim);
      border-radius: 12px;
      padding: 1.8rem 1.5rem;
      text-decoration: none;
      color: var(--text-primary);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      text-align: left;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.3s;
      background: linear-gradient(135deg, var(--glow-green), transparent);
    }
    .card:hover {
      border-color: var(--accent-green);
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(57, 255, 20, 0.08);
    }
    .card:hover::before { opacity: 1; }

    .card-icon {
      font-size: 1.8rem;
      margin-bottom: 0.8rem;
      position: relative;
      z-index: 1;
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
      position: relative;
      z-index: 1;
    }
    .card-desc {
      font-size: 0.8rem;
      color: var(--text-secondary);
      line-height: 1.6;
      position: relative;
      z-index: 1;
    }
    .card-arrow {
      position: absolute;
      bottom: 1rem;
      right: 1rem;
      font-size: 1rem;
      color: var(--accent-green);
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
    }
    .card:hover .card-arrow {
      opacity: 1;
      transform: translateX(4px);
    }

    /* Status bar */
    .status-bar {
      display: flex;
      justify-content: center;
      gap: 2rem;
      font-size: 0.75rem;
      color: var(--text-secondary);
      opacity: 0.5;
      margin-top: 2rem;
    }
    .status-bar .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-green);
      margin-right: 6px;
      animation: blink 2s step-end infinite;
    }

    /* Footer */
    .footer {
      margin-top: 2rem;
      font-size: 0.7rem;
      color: var(--text-secondary);
      opacity: 0.35;
      letter-spacing: 0.1em;
    }

    @media (max-width: 600px) {
      .title { font-size: 2.2rem; }
      .card-grid { grid-template-columns: 1fr; }
      body { padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="glow-top"></div>
  <div class="glow-bottom"></div>

  <div class="content">
    <div class="terminal-line">
      <span id="typed-text"></span><span class="cursor"></span>
    </div>

    <h1 class="title">藏子世间</h1>
    <div class="title-sub"><span>✦</span>  ZISHIJIAN  <span>✦</span></div>
    <div class="divider"></div>

    <p class="desc">
      在代码与叙事的交汇处，探索混沌与秩序的边缘。
      每一行都是世界的碎片，每一次点击都是命运的共振。
    </p>

    <div class="card-grid">
      <a href="chaos-narrative.html" class="card">
        <div class="card-icon">🌀</div>
        <div class="card-title">混沌</div>
        <div class="card-desc">宇宙模型 — 交互式WebGL可视化，在虚空中观测星辰诞生的轨迹</div>
        <span class="card-arrow">→</span>
      </a>

      <a href="heaven-narrative.html" class="card">
        <div class="card-icon">🌌</div>
        <div class="card-title">巡者</div>
        <div class="card-desc">叙事长诗 — 在光的帷幕下，巡游者与MiMo的永恒对话</div>
        <span class="card-arrow">→</span>
      </a>
    </div>

    <div class="status-bar">
      <span><span class="dot"></span>系统在线</span>
      <span>v0.1.0</span>
      <span>2026.05.03</span>
    </div>

    <div class="footer">[ root@zishijian ~ ]$ _</div>
  </div>

  <script>
    const texts = [
      '加载宇宙协议... 完成 ████████████ 100%',
      '混沌 → 秩序 → 叙事...',
      '欢迎来到 藏子世间',
      'root@zishijian ~ $ '
    ];
    let ti = 0, ci = 0;
    const el = document.getElementById('typed-text');
    function type() {
      if (ti >= texts.length) return;
      const t = texts[ti];
      if (ci < t.length) {
        el.textContent += t[ci++];
        setTimeout(type, 25);
      } else {
        setTimeout(() => { el.textContent = ''; ci = 0; ti++; type(); }, 1200);
      }
    }
    setTimeout(type, 500);
  </script>
</body>
</html>
