<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>我是凯尔 - 命运引导者 | 藏子世间</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink-black: #0a0908;
            --star-silver: #c0c8d0;
            --warm-gold: #d4a84b;
            --soft-gold: #f0d890;
            --deep-space: #1a1a2e;
            --twilight: #2d2d44;
            --text-primary: #e8e6e0;
            --text-secondary: #a0a0a8;
            --glow-gold: rgba(212, 168, 75, 0.5);
            --glow-silver: rgba(192, 200, 208, 0.3);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { padding-top: 70px;
            background: var(--ink-black);
            font-family: 'Noto Serif SC', serif;
            overflow-x: hidden;
            min-height: 100vh;
            color: var(--text-primary);
        }
        
        /* 导航栏 */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(10, 9, 8, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 2px solid var(--warm-gold);
            padding: 0.8rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            box-shadow: 0 0 30px rgba(212, 168, 75, 0.15);
        }
        
        .back-btn, .nav-link {
            color: var(--warm-gold);
            font-family: 'ZCOOL XiaoWei', serif;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: 1px solid transparent;
            background: transparent;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            border-radius: 4px;
        }
        
        .back-btn { border-color: rgba(212, 168, 75, 0.4); }
        
        .back-btn:hover, .nav-link:hover {
            color: var(--soft-gold);
            text-shadow: 0 0 15px var(--glow-gold);
            border-color: var(--warm-gold);
            background: rgba(212, 168, 75, 0.1);
        }
        
        /* 进度条 */
        .progress-bar {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(212, 168, 75, 0.15);
            z-index: 99;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--warm-gold), var(--soft-gold));
            transition: width 0.5s ease;
            box-shadow: 0 0 10px var(--glow-gold);
        }
        
        /* 星尘粒子 */
        .particles-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--star-silver);
            border-radius: 50%;
            opacity: 0.4;
            animation: floatDown linear infinite;
        }
        
        @keyframes floatDown {
            0% {
                transform: translateY(-10vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.4;
            }
            90% {
                opacity: 0.4;
            }
            100% {
                transform: translateY(110vh) translateX(20px);
                opacity: 0;
            }
        }
        
        /* 场景容器 */
        .scene-container {
            min-height: 100vh;
            width: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 60px;
            z-index: 10;
        }
        
        /* 场景背景 */
        .scene-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            background: radial-gradient(ellipse at center, var(--deep-space) 0%, var(--ink-black) 70%);
        }
        
        /* 场景图片 */
        .scene-image-wrapper {
            width: 100%;
            max-width: 600px;
            margin-bottom: 2rem;
            position: relative;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        
        .scene-image-wrapper.visible {
            opacity: 1;
            transform: scale(1);
        }
        
        .scene-image {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100vw;
            min-height: 100vh;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            z-index: -1;
            opacity: 0.35;
            filter: blur(1px);
        }
        
        /* 场景标题 */
        .scene-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 1.6rem;
            color: var(--soft-gold);
            text-align: center;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 20px var(--glow-gold);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease 0.3s, transform 0.6s ease 0.3s;
        }
        
        .scene-title.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* 叙事文字 */
        .narrative-text {
            max-width: 650px;
            text-align: center;
            color: var(--text-primary);
            font-size: 1.15rem;
            line-height: 2.2;
            margin-bottom: 2.5rem;
            padding: 2rem 2.5rem;
            background: rgba(30, 30, 50, 0.5);
            border-radius: 16px;
            border: 1px solid rgba(212, 168, 75, 0.2);
            box-shadow: 0 0 40px rgba(212, 168, 75, 0.1);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease 0.5s, transform 0.6s ease 0.5s;
            word-break: keep-all;
            overflow-wrap: break-word;
        }
        
        .narrative-text.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .narrative-text em {
            color: var(--soft-gold);
            font-style: normal;
            font-weight: 600;
        }
        
        /* 选择区域 */
        .choices-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            max-width: 550px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease 0.7s, transform 0.6s ease 0.7s;
        }
        
        .choices-container.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .choice-btn {
            padding: 1.3rem 2rem;
            background: linear-gradient(135deg, 
                rgba(212, 168, 75, 0.1), 
                rgba(192, 200, 208, 0.05));
            border: 2px solid var(--warm-gold);
            color: var(--soft-gold);
            font-family: 'Noto Serif SC', serif;
            font-size: 1.05rem;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s;
            text-align: left;
            position: relative;
            overflow: hidden;
        }
        
        .choice-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(212, 168, 75, 0.15), 
                transparent);
            transition: left 0.5s;
        }
        
        .choice-btn:hover {
            background: linear-gradient(135deg, 
                rgba(212, 168, 75, 0.25), 
                rgba(192, 200, 208, 0.15));
            transform: translateX(10px);
            box-shadow: 0 0 30px var(--glow-gold);
            border-color: var(--soft-gold);
            color: #fff;
        }
        
        .choice-btn:hover::before {
            left: 100%;
        }
        
        /* 结局页面 */
        .ending-container {
            text-align: center;
            padding: 3rem 2rem;
            max-width: 700px;
        }
        
        .ending-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 2.5rem;
            color: var(--soft-gold);
            margin-bottom: 2rem;
            text-shadow: 0 0 30px var(--glow-gold);
        }
        
        .ending-text {
            font-size: 1.2rem;
            line-height: 2.2;
            color: var(--text-primary);
            margin-bottom: 2.5rem;
        }
        
        .ending-signature {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 1.5rem;
            color: var(--warm-gold);
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(212, 168, 75, 0.3);
        }
        
        .ending-signature span {
            display: block;
            font-size: 1rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
            font-family: 'Noto Serif SC', serif;
            font-weight: 400;
        }
        
        .continue-btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: linear-gradient(135deg, 
                rgba(212, 168, 75, 0.2), 
                rgba(192, 200, 208, 0.1));
            border: 2px solid var(--warm-gold);
            color: var(--soft-gold);
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 1.1rem;
            text-decoration: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 2rem;
        }
        
        .continue-btn:hover {
            background: linear-gradient(135deg, 
                rgba(212, 168, 75, 0.4), 
                rgba(192, 200, 208, 0.2));
            transform: scale(1.05);
            box-shadow: 0 0 40px var(--glow-gold);
        }
        
        .back-link {
            display: block;
            margin-top: 2rem;
            color: rgba(212, 168, 75, 0.6);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s;
        }
        
        .back-link:hover {
            color: var(--warm-gold);
        }
        
        /* 淡入淡出 */
        .fade-out {
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        .fade-in {
            opacity: 1;
            transition: opacity 0.5s ease;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .scene-title { font-size: 1.4rem; }
            .narrative-text { 
                font-size: 1rem; 
                padding: 1.5rem 1.8rem;
                margin: 0 0.5rem 2rem;
            }
            .choice-btn { 
                font-size: 0.95rem; 
                padding: 1.1rem 1.5rem;
            }
            .scene-image {
                min-width: 100vw;
                min-height: 100vh;
            }
            .top-nav { 
                padding: 0.6rem 1rem; 
                gap: 0.8rem;
                flex-wrap: wrap;
            }
            .nav-link { 
                font-size: 0.85rem; 
                padding: 0.4rem 0.7rem;
            }
            .ending-title { font-size: 2rem; }
        }
    </style>
</head>
<body style="padding-top:70px">
    <nav class="top-nav">
        <button class="back-btn" onclick="goBack()">← 返回</button>
        <a href="character-player.html" class="nav-link">角色介绍</a>
        <a href="index.html" class="nav-link">首页</a>
    </nav>
    
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
    
    <div class="particles-container" id="particles"></div>
    
    <div class="scene-bg"></div>
    
    <div id="sceneContent" class="scene-container">
        <!-- 场景内容将动态加载 -->
    </div>

    <script>
        // 创建星尘粒子
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 30;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (15 + Math.random() * 20) + 's';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.width = (2 + Math.random() * 3) + 'px';
                particle.style.height = particle.style.width;
                container.appendChild(particle);
            }
        }
        
                // 故事数据 - Kael的故事 (重写版)
        const storyData = {
            scenes: {
                'scene-1': {
                    id: 'scene-1',
                    title: '一 · 起始',
                    image: 'images/guides/kael.mp4',
                    narrative: '我第一次站到那些门中间时，还以为自己赌输了命。<br><br>那是个冬天，我记得很清楚，因为输光了最后一点钱，身上冷得像块铁。<br><br>我没想寻死，就是想找条没走过的路，结果一脚踩空，就掉进了这个不黑不白、没前没后的地方。<br><br>这什么都没有，只有门，一排排望不到头的门，安静得能听见自己的心跳。',
                    choices: [
                        { text: '继续', target: 'scene-2' }
                    ],
                    progress: 12
                },
                'scene-2': {
                    id: 'scene-2',
                    title: '二 · 第一扇门',
                    image: 'images/guides/kael.mp4',
                    narrative: '第一扇门跟其他的没什么两样，木头的，上面连个把手都没有。<br><br>我站了很久，久到感觉自己的胡子都长出来了。<br><br>我不是在想门后面有什么，而是在想，推开它，会不会比站在这里发霉要好一点。<br><br>说白了，就是个赌徒在押最后一把，赌注是自己。',
                    choices: [
                        { text: '继续', target: 'scene-3' }
                    ],
                    progress: 25
                },
                'scene-3': {
                    id: 'scene-3',
                    title: '三 · 代价',
                    image: 'images/guides/kael.mp4',
                    narrative: '代价？<br><br>你问我失去了什么。我失去了"偶然"。<br><br>我再也没办法在街角偶遇谁，没办法因为赶不上一班公交而恼火，也没办法享受一个什么都不知道的下午。<br><br>我看见所有路的尽头，却不能走上任何一条。<br><br>就像一个厨子，尝遍了天下所有的味道，却唯独不能给自己做一顿饭。',
                    choices: [
                        { text: '选择记住所有', target: 'branch-remember' },
                        { text: '选择遗忘', target: 'branch-forget' }
                    ],
                    progress: 40
                },
                'branch-remember': {
                    id: 'branch-remember',
                    title: '分支 · 选择记住所有',
                    image: 'images/guides/kael.mp4',
                    narrative: '我试过记住所有事。<br><br>每一个选择，每一张脸，每一次心碎。我以为这是尊重，是见证。<br><br>结果呢？那些记忆在我脑子里打架，张三的悔恨混着李四的狂喜，像个馊掉的大杂烩。<br><br>你记得太多，就会开始分不清，那些眼泪到底是为谁流的。',
                    choices: [
                        { text: '继续', target: 'scene-first-person' }
                    ],
                    progress: 50
                },
                'branch-forget': {
                    id: 'branch-forget',
                    title: '分支 · 选择遗忘',
                    image: 'images/guides/kael.mp4',
                    narrative: '后来我学聪明了，我开始遗忘。<br><br>每送走一个人，我就清空一部分自己。这很管用，脑子清爽了，心也不那么堵了。<br><br>但问题是，你把沙子一把一把扔回海里，最后剩下的，还是那片海吗？<br><br>我不知道。有时候我看着镜子里的自己，觉得那张脸挺陌生的。',
                    choices: [
                        { text: '继续', target: 'scene-first-person' }
                    ],
                    progress: 50
                },
                'scene-first-person': {
                    id: 'scene-first-person',
                    title: '四 · 第一个主角',
                    image: 'images/guides/kael.mp4',
                    narrative: '我带的第一个人，是个想成为面包师的年轻人。<br><br>他没什么宏大的理想，就想开个小店，闻着麦香过一辈子。<br><br>他总问我，哪条路才是对的。我没告诉他答案，因为我也不知道。<br><br>我只是把钥匙递给他，看他笨拙地烤出了第一个歪歪扭扭的面包。那是我在这里闻到过的，最香的味道。',
                    choices: [
                        { text: '继续', target: 'scene-now' }
                    ],
                    progress: 65
                },
                'scene-now': {
                    id: 'scene-now',
                    title: '五 · 现在的我',
                    image: 'images/guides/kael.mp4',
                    narrative: '现在的我？<br><br>我就是个看门的。偶尔给迷路的人递杯水，指个方向。<br><br>我不再试图理解所有事，也不再为谁的结局感到难过。宇宙这么大，悲欢离合比星星还多，我管不过来。<br><br>我只管好我这一亩三分地，确保门轴没生锈，这就够了。',
                    choices: [
                        { text: '选择继续', target: 'ending-continue' },
                        { text: '选择停下', target: 'ending-stop' }
                    ],
                    progress: 80
                }
            },
            endings: {
                'ending-continue': {
                    title: '六 · 选择继续',
                    narrative: '你问我为什么还在这儿？<br><br>因为这比什么都不做有意思。每扇门后面都有人在找路，我帮不帮他们，他们都会走。<br><br>但有人陪着，总比一个人好吧。',
                    signature: '我是凯尔。<span>门与门之间的守望者。</span>',
                    progress: 100
                },
                'ending-stop': {
                    title: '六 · 选择停下',
                    narrative: '我也想过停下来。关上所有的门，找个角落坐着，不再管谁去哪儿。<br><br>但每次我一闭眼，就听见门后面有人在叫——不是叫我名字，就是在叫"有没有人"。<br><br>我做不到假装听不见。',
                    signature: '我是凯尔。<span>听见呼唤就无法转身的人。</span>',
                    progress: 100
                },
                'ending-main': {
                    title: '七 · 我是凯尔',
                    narrative: '所以，你问我为什么在这儿？<br><br>因为我跟你们一样，也卡在某个地方动弹不得。<br><br>我选择待在这里，不是因为我有多伟大，能指引谁。只是因为，看着你们在无数个可能性里挣扎、选择、然后头也不回地走下去，比我自己一个人对着这些破门发呆，要有趣多了。<br><br>说到底，我也是个需要找点乐子的可怜虫罢了。',
                    signature: '我是凯尔。<span>一个在无尽门前等待的人。</span>',
                    progress: 100
                }
            }
        };
        
        let currentScene = 'scene-1';
        
        function goBack() {
            window.location.href = 'character-player.html';
        }
        
        function updateProgress(progress) {
            document.getElementById('progressFill').style.width = progress + '%';
        }
        
        function renderScene(sceneId) {
            const container = document.getElementById('sceneContent');
            const scene = storyData.scenes[sceneId];
            
            if (!scene) return;
            
            container.classList.add('fade-out');
            
            setTimeout(() => {
                let mediaHtml = scene.image.endsWith('.mp4') 
            ? '<video src="' + scene.image + '" class="scene-image" autoplay loop muted playsinline></video>'
            : '<div class="scene-image-wrapper"><img src="' + scene.image + '" alt="' + scene.title + '" class="scene-image"></div>';
        let html = mediaHtml + '<h2 class="scene-title">' + scene.title + '</h2><p class="narrative-text">' + scene.narrative + '</p><div class="choices-container">';
                
                scene.choices.forEach(choice => {
                    html += '<button class="choice-btn" onclick="goToScene(\'' + choice.target + '\')">' + choice.text + '</button>';
                });
                
                html += '</div>';
                
                container.innerHTML = html;
                container.classList.remove('fade-out');
                container.classList.add('fade-in');
                
                updateProgress(scene.progress);
                
                setTimeout(() => {
                    document.querySelectorAll('.scene-image-wrapper, .scene-title, .narrative-text, .choices-container').forEach(el => {
                        el.classList.add('visible');
                    });
                }, 100);
            }, 500);
        }
        
        function renderEnding(endingId) {
            const container = document.getElementById('sceneContent');
            const ending = storyData.endings[endingId];
            
            if (!ending) return;
            
            container.classList.add('fade-out');
            
            setTimeout(() => {
                let html = '<div class="ending-container"><h2 class="ending-title">' + ending.title + '</h2><p class="ending-text">' + ending.narrative + '</p><div class="ending-signature">' + ending.signature + '</div><a href="character-player.html" class="continue-btn">返回角色介绍</a><a href="index.html" class="back-link">← 返回首页</a></div>';
                
                container.innerHTML = html;
                container.classList.remove('fade-out');
                container.classList.add('fade-in');
                
                updateProgress(ending.progress);
            }, 500);
        }
        
        function goToScene(sceneId) {
            if (sceneId.startsWith('ending-')) {
                renderEnding(sceneId);
            } else {
                currentScene = sceneId;
                renderScene(sceneId);
            }
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
            renderScene('scene-1');
        });
    </script>
<script src="js/i18n.js"></script>
</body>
</html>
